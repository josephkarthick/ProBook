{% extends "ProBook/Base/base.html" %}
{% block title %}Create Customer{% endblock %}

{% block content %}

<div class="content">

<h3 class="mb-4">Create Customer</h3>

<div class="card">
<div class="card-body">

<div class="row mb-3">

<div class="col-md-6">
<label>Name *</label>
<input class="form-control" id="name">
</div>

<div class="col-md-6">
<label>Phone</label>
<input class="form-control" id="phone">
</div>

</div>

<div class="row mb-3">

<div class="col-md-6">
<label>Email</label>
<input class="form-control" id="email">
</div>

<div class="col-md-6">
<label>GST Number</label>
<input class="form-control" id="gst">
</div>

</div>

<div class="mb-3">
<label>Address</label>
<textarea class="form-control" id="address"></textarea>
</div>

<button class="btn btn-success" onclick="createCustomer()">
Save Customer
</button>

</div>
</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>

async function createCustomer(){

const name = document.getElementById("name").value.trim()

if(!name){

Swal.fire({
icon:"warning",
title:"Name Required",
text:"Please enter customer name"
})

return
}

try{

const res = await fetch("/api/customers/",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

name: name,
phone: document.getElementById("phone").value,
email: document.getElementById("email").value,
address: document.getElementById("address").value,
gst_number: document.getElementById("gst").value

})

})

const data = await res.json()

if(res.ok){

Swal.fire({
icon:"success",
title:"Customer Created",
timer:1500,
showConfirmButton:false
})

setTimeout(()=>{
window.location.href="/customers"
},1500)

}else{

Swal.fire({
icon:"error",
title:"Error",
text:data.detail || "Failed to create customer"
})

}

}catch(err){

Swal.fire({
icon:"error",
title:"Server Error",
text:"Please try again later"
})

}

}

</script>

{% endblock %}
