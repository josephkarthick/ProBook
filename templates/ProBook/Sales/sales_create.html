{% extends "ProBook/Base/base.html" %}
{% block title %}Sales Invoice | ProBook{% endblock %}

{% block content %}

<div class="content">

<div class="d-flex justify-content-between mb-4">
<h3>Sales Invoice</h3>

<button class="btn btn-success" onclick="saveSales()">
Save Invoice
</button>
</div>

<div class="card">
<div class="card-body">

<div class="row mb-4">

<div class="col-md-4">
<label>Customer</label>

<div class="d-flex">
<select class="form-select me-2" id="customerSelect"></select>
<button class="btn btn-primary" onclick="openCustomerModal()">+</button>
</div>

</div>

<div class="col-md-3">
<label>Invoice Date</label>
<input type="date" id="invoiceDate" class="form-control">
</div>
<div class="col-md-3">
<label>Invoice Type</label>
<select id="invoiceType" class="form-select" onchange="handleInvoiceType()">
    <option value="manual">Manual</option>
    <option value="sales_order">From Sales Order</option>
    <option value="delivery">From Delivery</option>
</select>
</div>

<div class="col-md-4 d-none" id="sourceWrapper">
<label>Select Source</label>
<select id="sourceSelect" class="form-select"></select>
</div>
</div>




<table class="table table-bordered" id="salesTable">

<thead>
<tr>
<th width="250">Item</th>
<th width="120">Qty</th>
<th width="120">Price</th>
<th width="100">GST %</th>
<th width="150">Total</th>
<th width="50"></th>
</tr>
</thead>

<tbody></tbody>

</table>

<br>

<button class="btn btn-sm btn-primary" onclick="addRow()">
+ Add Item
</button>

<hr>

<div class="row justify-content-end">

<div class="col-md-4">

<table class="table">
<tr>
<th>Subtotal</th>
<td id="subtotal">0.00</td>
</tr>

<tr>
<th>GST</th>
<td id="taxTotal">0.00</td>
</tr>

<tr class="fw-bold">
<th>Grand Total</th>
<td id="grandTotal">0.00</td>
</tr>
</table>

</div>

</div>

</div>
</div>

</div>

<!-- ===============================
CUSTOMER MODAL
=============================== -->

<div class="modal fade" id="customerModal">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5>Add Customer</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<input class="form-control mb-2" id="custName" placeholder="Customer Name *">

<input class="form-control mb-2" id="custPhone" placeholder="Phone">

<input class="form-control mb-2" id="custEmail" placeholder="Email (Optional)">

<input class="form-control mb-2" id="custGST" placeholder="GST Number (Optional)">

</div>

<div class="modal-footer">
<button class="btn btn-success" onclick="saveCustomer()">Save</button>
</div>

</div>
</div>
</div>

<script>
let items = [];

const customerSelect = document.getElementById("customerSelect");
const invoiceDate = document.getElementById("invoiceDate");

/* ================= INIT ================= */
document.addEventListener("DOMContentLoaded", async () => {

    invoiceDate.value = new Date().toISOString().split("T")[0];

    await loadCustomers();
    await loadItems();

    addRow();
});

/* ================= LOAD ================= */

async function loadCustomers(){
    const res = await fetch("/api/customers/");
    const data = await res.json();

    customerSelect.innerHTML = '<option value="">Select Customer</option>';
    data.forEach(c=>{
        customerSelect.innerHTML += `<option value="${c.id}">${c.name}</option>`;
    });
}

async function loadItems(){
    const res = await fetch("/api/items");
    items = await res.json();
}

/* ================= ROW ================= */

function addRow(){

    const options = items.map(i => 
        `<option value="${i.id}" 
            data-price="${i.selling_price}" 
            data-gst="${i.gst_rate}"
            data-stock="${i.stock || 0}">
            ${i.name} (Stock: ${i.stock || 0})
        </option>`
    ).join("");

    const row = document.createElement("tr");

    row.innerHTML = `
    <td>
        <select class="form-select item-select">
            <option value="">Select Item</option>
            ${options}
        </select>
    </td>

    <td>
        <input type="number" class="form-control qty" value="1" min="1">
        <small class="text-muted stock-label"></small>
    </td>

    <td><input type="number" class="form-control price" step="0.01"></td>
    <td><input type="number" class="form-control gst" step="0.01"></td>

    <td class="rowTotal">0.00</td>

    <td><button class="btn btn-danger btn-sm">X</button></td>
    `;

    /* EVENTS */
    row.querySelector(".item-select").addEventListener("change", function(){
        itemChanged(this);
    });

    row.querySelector(".qty").addEventListener("input", function(){
        validateStock(this);
        calculateRow(this);
    });

    row.querySelector(".price").addEventListener("input", function(){
        calculateRow(this);
    });

    row.querySelector(".gst").addEventListener("input", function(){
        calculateRow(this);
    });

    row.querySelector("button").addEventListener("click", function(){
        row.remove();
        calculateTotals();
    });

    document.querySelector("#salesTable tbody").appendChild(row);
}

/* ================= ITEM CHANGE ================= */

function itemChanged(select){

    const row = select.closest("tr");
    const opt = select.options[select.selectedIndex];

    if(!opt || !opt.value){
        return;
    }

    const price = opt.getAttribute("data-price");
    const gst = opt.getAttribute("data-gst");
    const stock = Number(opt.getAttribute("data-stock") || 0);

    row.querySelector(".price").value = price || 0;
    row.querySelector(".gst").value = gst || 0;

    row.dataset.stock = stock;

    row.querySelector(".stock-label").innerText = `Available: ${stock}`;

    validateStock(row.querySelector(".qty"));
    calculateRow(select);
}

/* ================= STOCK VALIDATION ================= */

function validateStock(input){

    const row = input.closest("tr");
    const stock = Number(row.dataset.stock || 0);
    const qty = Number(input.value || 0);

    if(qty > stock){

        input.value = stock;

        Swal.fire({
            icon: "warning",
            text: `Only ${stock} items available in stock`
        });

        row.querySelector(".qty").classList.add("is-invalid");
    }else{
        row.querySelector(".qty").classList.remove("is-invalid");
    }
}

/* ================= ROW CALC ================= */

function calculateRow(input){

    const row = input.closest("tr");

    const qty = Number(row.querySelector(".qty").value) || 0;
    const price = Number(row.querySelector(".price").value) || 0;
    const gst = Number(row.querySelector(".gst").value) || 0;

    const sub = qty * price;
    const tax = sub * gst / 100;

    row.querySelector(".rowTotal").innerText = (sub + tax).toFixed(2);

    calculateTotals();
}

/* ================= TOTAL ================= */

function calculateTotals(){

    let sub = 0;
    let tax = 0;

    document.querySelectorAll("#salesTable tbody tr").forEach(row=>{
        const qty = Number(row.querySelector(".qty").value) || 0;
        const price = Number(row.querySelector(".price").value) || 0;
        const gst = Number(row.querySelector(".gst").value) || 0;

        const rowSub = qty * price;
        const rowTax = rowSub * gst / 100;

        sub += rowSub;
        tax += rowTax;
    });

    subtotal.innerText = sub.toFixed(2);
    taxTotal.innerText = tax.toFixed(2);
    grandTotal.innerText = (sub + tax).toFixed(2);
}

/* ================= SAVE ================= */

async function saveSales(){

    const type = document.getElementById("invoiceType").value   // ✅ FIX
    const sourceId = document.getElementById("sourceSelect").value  // ✅ FIX

    if(!customerSelect.value){
        Swal.fire("Select customer","","warning");
        return;
    }

    let itemsData = [];
    let hasError = false;

    document.querySelectorAll("#salesTable tbody tr").forEach(row=>{
        const id = row.querySelector(".item-select").value;
        const qty = Number(row.querySelector(".qty").value);
        const stock = Number(row.dataset.stock || 0);

        if(qty > stock){
            hasError = true;
        }

        if(id){
            itemsData.push({
                item_id: Number(id),
                quantity: qty,
                price: Number(row.querySelector(".price").value),
                gst_rate: Number(row.querySelector(".gst").value)
            });
        }
    });

    if(hasError){
        Swal.fire("Stock exceeded!","","error");
        return;
    }

    if(itemsData.length === 0){
        Swal.fire("Add items first","","warning");
        return;
    }

    const res = await fetch("/api/sales/", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            customer_id: Number(customerSelect.value),
            invoice_date: invoiceDate.value,

            source_type: type,                      // ✅ now defined
            source_id: sourceId ? Number(sourceId) : null,

            items: itemsData
        })
    });

    if(res.ok){
        Swal.fire("Saved","","success");
        setTimeout(()=>location.reload(),1000);
    }else{
        Swal.fire("Error","","error");
    }
}
</script>

<script>

/* ===============================
INVOICE TYPE CHANGE
=============================== */

async function handleInvoiceType(){

    const type = document.getElementById("invoiceType").value
	const sourceId = document.getElementById("sourceSelect").value
    const wrapper = document.getElementById("sourceWrapper")
    const sourceSelect = document.getElementById("sourceSelect")

    wrapper.classList.add("d-none")
    sourceSelect.innerHTML = ""

    if(type === "sales_order"){
        wrapper.classList.remove("d-none")
        await loadSalesOrders()
    }

    if(type === "delivery"){
        wrapper.classList.remove("d-none")
        await loadDeliveries()
    }
}


/* ===============================
LOAD SALES ORDERS
=============================== */

async function loadSalesOrders(){

    const res = await fetch("/api/sales-orders/")
    const data = await res.json()

    const sourceSelect = document.getElementById("sourceSelect")

    sourceSelect.innerHTML = `<option value="">Select Sales Order</option>`

    data.forEach(so=>{
        sourceSelect.innerHTML += `
        <option value="${so.id}">
            ${so.so_number} - ${so.customer_name}
        </option>`
    })
}


/* ===============================
LOAD DELIVERIES (NEW)
=============================== */

async function loadDeliveries(){

    const res = await fetch("/api/deliveries/")   // 🔥 create this API
    const data = await res.json()

    const sourceSelect = document.getElementById("sourceSelect")

    sourceSelect.innerHTML = `<option value="">Select Delivery</option>`

    data.forEach(d=>{
        sourceSelect.innerHTML += `
        <option value="${d.id}">
            ${d.delivery_no} - ${d.customer_name}
        </option>`
    })
}


/* ===============================
ON SELECT SOURCE (FIXED)
=============================== */

document.addEventListener("DOMContentLoaded", () => {

    document.getElementById("sourceSelect")
    .addEventListener("change", async function(){

        const id = this.value
        const type = document.getElementById("invoiceType").value

        console.log("Selected:", type, id)

        if(!id) return

        if(type === "sales_order"){
            await loadFromSalesOrder(id)
        }

        if(type === "delivery"){
            await loadFromDelivery(id)
        }
    })
})


/* ===============================
LOAD FROM SALES ORDER
=============================== */

async function loadFromSalesOrder(id){

    const res = await fetch(`/api/sales-orders/${id}`)
    const data = await res.json()

    document.getElementById("customerSelect").value = data.customer_id

    const tbody = document.querySelector("#salesTable tbody")
    tbody.innerHTML = ""

    data.items.forEach(item=>{

        addRow()

        const row = tbody.lastElementChild
        const itemSelect = row.querySelector(".item-select")

        itemSelect.value = item.item_id

        // ✅ VERY IMPORTANT
        itemChanged(itemSelect)

        // ✅ AFTER itemChanged
        row.querySelector(".qty").value = item.quantity

        calculateRow(row.querySelector(".qty"))
    })
}


/* ===============================
LOAD FROM DELIVERY (NEW)
=============================== */

async function loadFromDelivery(id){

    const res = await fetch(`/api/deliveries/view/${id}`)   // ✅ FIXED
    const data = await res.json()

    console.log("DELIVERY DATA:", data)

    document.getElementById("customerSelect").value = data.customer_id

    const tbody = document.querySelector("#salesTable tbody")
    tbody.innerHTML = ""

    if(!data.items || data.items.length === 0){
        console.warn("No delivery items")
        return
    }

    data.items.forEach(item=>{

        addRow()

        const row = tbody.lastElementChild
        const itemSelect = row.querySelector(".item-select")

        itemSelect.value = item.item_id

        // ✅ CRITICAL FIX
        itemChanged(itemSelect)

        // ✅ set qty AFTER itemChanged
        row.querySelector(".qty").value = item.quantity

        calculateRow(row.querySelector(".qty"))
    })
}

</script>

{% endblock %}
