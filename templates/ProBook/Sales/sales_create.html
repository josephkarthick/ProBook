{% extends "ProBook/Base/base.html" %}
{% block title %}Sales Invoice | ProBook{% endblock %}

{% block content %}

<div class="content">

<div class="d-flex justify-content-between mb-4">
<h3>Sales Invoice</h3>

<button class="btn btn-success" onclick="saveSales()">
Save Invoice
</button>
</div>

<div class="card">
<div class="card-body">

<div class="row mb-4">

<div class="col-md-4">
<label>Customer</label>

<div class="d-flex">
<select class="form-select me-2" id="customerSelect"></select>
<button class="btn btn-primary" onclick="openCustomerModal()">+</button>
</div>

</div>

<div class="col-md-3">
<label>Invoice Date</label>
<input type="date" id="invoiceDate" class="form-control">
</div>
<div class="col-md-3">
<label>Invoice Type</label>
<select id="invoiceType" class="form-select" onchange="handleInvoiceType()">
    <option value="manual">Manual</option>
    <option value="sales_order">From Sales Order</option>
    <option value="delivery">From Delivery</option>
</select>
</div>

<div class="col-md-4 d-none" id="sourceWrapper">
<label>Select Source</label>
<select id="sourceSelect" class="form-select"></select>
</div>
</div>




<table class="table table-bordered" id="salesTable">

<thead>
<tr>
<th width="250">Item</th>
<th width="120">Qty</th>
<th width="120">Price</th>
<th width="100">GST %</th>
<th width="150">Total</th>
<th width="50"></th>
</tr>
</thead>

<tbody></tbody>

</table>

<br>

<button class="btn btn-sm btn-primary" onclick="addRow()">
+ Add Item
</button>

<hr>

<div class="row justify-content-end">

<div class="col-md-4">

<table class="table">
<tr>
<th>Subtotal</th>
<td id="subtotal">0.00</td>
</tr>

<tr>
<th>GST</th>
<td id="taxTotal">0.00</td>
</tr>

<tr class="fw-bold">
<th>Grand Total</th>
<td id="grandTotal">0.00</td>
</tr>
</table>

</div>

</div>

</div>
</div>

</div>

<!-- ===============================
CUSTOMER MODAL
=============================== -->

<div class="modal fade" id="customerModal">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5>Add Customer</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<input class="form-control mb-2" id="custName" placeholder="Customer Name *">

<input class="form-control mb-2" id="custPhone" placeholder="Phone">

<input class="form-control mb-2" id="custEmail" placeholder="Email (Optional)">

<input class="form-control mb-2" id="custGST" placeholder="GST Number (Optional)">

</div>

<div class="modal-footer">
<button class="btn btn-success" onclick="saveCustomer()">Save</button>
</div>

</div>
</div>
</div>

<script>

let items = []
let customers = []

/* ===============================
ALERT
=============================== */
function showAlert(message, type="info"){
    Swal.fire({
        text: message,
        icon: type,
        timer: 1800,
        showConfirmButton: false
    })
}

/* ===============================
INVOICE TYPE
=============================== */
async function handleInvoiceType(){

    const type = invoiceType.value
    sourceWrapper.classList.add("d-none")
    sourceSelect.innerHTML = ""

    if(type === "sales_order"){
        sourceWrapper.classList.remove("d-none")
        await loadSalesOrders()
    }

    if(type === "delivery"){
        sourceWrapper.classList.remove("d-none")
        await loadDeliveries()
    }
}

/* ===============================
LOAD SALES ORDERS
=============================== */
async function loadSalesOrders(){

    const res = await fetch("/api/sales-orders?status=pending")
    const data = await res.json()

    sourceSelect.innerHTML = `<option value="">Select Sales Order</option>`

    data.forEach(so=>{
        sourceSelect.innerHTML += `
        <option value="${so.id}">
            ${so.order_no} - ${so.customer_name || ''}
        </option>`
    })
}

/* ===============================
LOAD DELIVERIES
=============================== */
async function loadDeliveries(){

    const res = await fetch("/api/deliveries?status=pending_invoice")
    const data = await res.json()

    sourceSelect.innerHTML = `<option value="">Select Delivery</option>`

    data.forEach(d=>{
        sourceSelect.innerHTML += `
        <option value="${d.id}">
            ${d.delivery_no}
        </option>`
    })
}

/* ===============================
SOURCE SELECT
=============================== */
sourceSelect.addEventListener("change", async function(){

    const id = this.value
    const type = invoiceType.value

    if(!id) return

    if(type === "sales_order"){
        await loadFromSalesOrder(id)
    }

    if(type === "delivery"){
        await loadFromDelivery(id)
    }
})

/* ===============================
LOAD FROM SALES ORDER
=============================== */
async function loadFromSalesOrder(id){

    const res = await fetch(`/api/sales-orders/${id}`)
    const data = await res.json()

    customerSelect.value = data.customer_id

    const tbody = document.querySelector("#salesTable tbody")
    tbody.innerHTML = ""

    data.items.forEach(item=>{

        addRow()
        const row = tbody.lastChild

        row.querySelector(".item-select").value = item.item_id
        row.querySelector(".qty").value = item.qty
        row.querySelector(".price").value = item.price
        row.querySelector(".gst").value = item.gst_rate

        calculateRow(row.querySelector(".price"))
    })
}

/* ===============================
LOAD FROM DELIVERY
=============================== */
async function loadFromDelivery(id){

    const res = await fetch(`/api/deliveries/${id}`)
    const data = await res.json()

    customerSelect.value = data.customer_id

    const tbody = document.querySelector("#salesTable tbody")
    tbody.innerHTML = ""

    data.items.forEach(item=>{

        addRow()
        const row = tbody.lastChild

        row.querySelector(".item-select").value = item.item_id
        row.querySelector(".qty").value = item.qty
        row.querySelector(".qty").readOnly = true   // 🔥 lock qty
        row.querySelector(".price").value = item.price
        row.querySelector(".gst").value = item.gst_rate

        calculateRow(row.querySelector(".price"))
    })
}

/* ===============================
CUSTOMER
=============================== */
function openCustomerModal(){
    new bootstrap.Modal(customerModal).show()
}

async function saveCustomer(){

    const name = custName.value.trim()

    if(!name){
        showAlert("Customer name required","warning")
        return
    }

    const res = await fetch("/api/customers/",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({
            name,
            phone:custPhone.value,
            email:custEmail.value || null,
            gst_number:custGST.value || null
        })
    })

    const data = await res.json()

    if(res.ok){
        customerSelect.innerHTML += `<option value="${data.id}">${data.name}</option>`
        customerSelect.value = data.id

        bootstrap.Modal.getInstance(customerModal).hide()
        showAlert("Customer added","success")
    }
}

/* ===============================
LOAD CUSTOMERS
=============================== */
async function loadCustomers(){

    const res = await fetch("/api/customers/")
    customers = await res.json()

    customerSelect.innerHTML = `<option value="">Select Customer</option>`

    customers.forEach(c=>{
        customerSelect.innerHTML += `<option value="${c.id}">${c.name}</option>`
    })
}

/* ===============================
LOAD ITEMS
=============================== */
async function loadItems(){

    const res = await fetch("/api/items")
    items = await res.json()
}

/* ===============================
ADD ROW
=============================== */
function addRow(){

    const options = items.map(i=>`
    <option value="${i.id}" data-price="${i.selling_price}" data-gst="${i.gst_rate}">
    ${i.name}
    </option>`).join("")

    const row = document.createElement("tr")

    row.innerHTML = `
    <td><select class="form-select item-select" onchange="itemChanged(this)">
    <option value="">Select Item</option>${options}</select></td>
    <td><input type="number" class="form-control qty" value="1" min="1" oninput="calculateRow(this)"></td>
    <td><input type="number" class="form-control price" step="0.01" oninput="calculateRow(this)"></td>
    <td><input type="number" class="form-control gst" step="0.01" oninput="calculateRow(this)"></td>
    <td class="rowTotal">0.00</td>
    <td><button class="btn btn-danger btn-sm" onclick="removeRow(this)">✕</button></td>
    `

    document.querySelector("#salesTable tbody").appendChild(row)
}

/* ===============================
ITEM CHANGE
=============================== */
function itemChanged(select){

    const row = select.closest("tr")
    const opt = select.options[select.selectedIndex]

    row.querySelector(".price").value = opt.getAttribute("data-price") || 0
    row.querySelector(".gst").value = opt.getAttribute("data-gst") || 0

    calculateRow(row.querySelector(".price"))
}

/* ===============================
REMOVE
=============================== */
function removeRow(btn){
    btn.closest("tr").remove()
    calculateTotals()
}

/* ===============================
ROW CALC
=============================== */
function calculateRow(input){

    const row = input.closest("tr")

    const qty = Number(row.querySelector(".qty").value)
    const price = Number(row.querySelector(".price").value)
    const gst = Number(row.querySelector(".gst").value)

    const sub = qty * price
    const tax = sub * gst / 100

    row.querySelector(".rowTotal").innerText = (sub + tax).toFixed(2)

    calculateTotals()
}

/* ===============================
TOTAL
=============================== */
function calculateTotals(){

    let sub = 0
    let tax = 0

    document.querySelectorAll("#salesTable tbody tr").forEach(r=>{
        const q = Number(r.querySelector(".qty").value)
        const p = Number(r.querySelector(".price").value)
        const g = Number(r.querySelector(".gst").value)

        sub += q*p
        tax += (q*p*g/100)
    })

    subtotal.innerText = sub.toFixed(2)
    taxTotal.innerText = tax.toFixed(2)
    grandTotal.innerText = (sub+tax).toFixed(2)
}

/* ===============================
SAVE
=============================== */
async function saveSales(){

    if(!customerSelect.value){
        showAlert("Select customer","warning")
        return
    }

    let invoiceItems = []

    document.querySelectorAll("#salesTable tbody tr").forEach(r=>{
        const id = r.querySelector(".item-select").value

        if(id){
            invoiceItems.push({
                item_id:Number(id),
                quantity:Number(r.querySelector(".qty").value),
                price:Number(r.querySelector(".price").value),
                gst_rate:Number(r.querySelector(".gst").value)
            })
        }
    })

    if(invoiceItems.length === 0){
        showAlert("Add items first","warning")
        return
    }

    const confirm = await Swal.fire({
        title:"Save Invoice?",
        icon:"question",
        showCancelButton:true
    })

    if(!confirm.isConfirmed) return

    const res = await fetch("/api/sales/",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({
            customer_id:Number(customerSelect.value),
            invoice_date:invoiceDate.value,
            source_type:invoiceType.value,
            source_id:sourceSelect.value || null,
            items:invoiceItems
        })
    })

    if(res.ok){
        showAlert("Invoice Created","success")
        setTimeout(()=>location.href="/sales",1200)
    }else{
        showAlert("Error creating invoice","error")
    }
}

/* ===============================
INIT
=============================== */
document.addEventListener("DOMContentLoaded", async ()=>{

    invoiceDate.value = new Date().toISOString().split("T")[0]

    await loadCustomers()
    await loadItems()

    addRow()
})

</script>

{% endblock %}
