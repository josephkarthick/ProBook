{% extends "ProBook/Base/base.html" %}
{% block title %}Sales Invoice | ProBook{% endblock %}

{% block content %}

<div class="content">

<div class="d-flex justify-content-between mb-4">
<h3>Sales Invoice</h3>

<button class="btn btn-success" onclick="saveSales()">
Save Invoice
</button>
</div>

<div class="card">
<div class="card-body">

<div class="row mb-4">

<div class="col-md-4">
<label>Customer</label>

<div class="d-flex">
<select class="form-select me-2" id="customerSelect"></select>
<button class="btn btn-primary" onclick="openCustomerModal()">+</button>
</div>

</div>

<div class="col-md-3">
<label>Invoice Date</label>
<input type="date" id="invoiceDate" class="form-control">
</div>

</div>


<table class="table table-bordered" id="salesTable">

<thead>
<tr>
<th width="250">Item</th>
<th width="120">Qty</th>
<th width="120">Price</th>
<th width="100">GST %</th>
<th width="150">Total</th>
<th width="50"></th>
</tr>
</thead>

<tbody></tbody>

</table>

<br>

<button class="btn btn-sm btn-primary" onclick="addRow()">
+ Add Item
</button>

<hr>

<div class="row justify-content-end">

<div class="col-md-4">

<table class="table">
<tr>
<th>Subtotal</th>
<td id="subtotal">0.00</td>
</tr>

<tr>
<th>GST</th>
<td id="taxTotal">0.00</td>
</tr>

<tr class="fw-bold">
<th>Grand Total</th>
<td id="grandTotal">0.00</td>
</tr>
</table>

</div>

</div>

</div>
</div>

</div>

<!-- ===============================
CUSTOMER MODAL
=============================== -->

<div class="modal fade" id="customerModal">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5>Add Customer</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<input class="form-control mb-2" id="custName" placeholder="Customer Name *">

<input class="form-control mb-2" id="custPhone" placeholder="Phone">

<input class="form-control mb-2" id="custEmail" placeholder="Email (Optional)">

<input class="form-control mb-2" id="custGST" placeholder="GST Number (Optional)">

</div>

<div class="modal-footer">
<button class="btn btn-success" onclick="saveCustomer()">Save</button>
</div>

</div>
</div>
</div>

<script>

let items = []
let customers = []

/* ===============================
SWEET ALERT HELPER
=============================== */
function showAlert(message, type = "info") {
    Swal.fire({
        text: message,
        icon: type,
        timer: 1800,
        showConfirmButton: false
    });
}

/* ===============================
CUSTOMER
=============================== */
function openCustomerModal(){
    new bootstrap.Modal(document.getElementById("customerModal")).show()
}

async function saveCustomer(){

    const name = custName.value.trim()
    const phone = custPhone.value.trim()
    const email = custEmail.value.trim()
    const gst_number = custGST.value.trim()

    if(!name){
        showAlert("Customer name is required", "warning")
        return
    }

    const res = await fetch("/api/customers/",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
            name,
            phone,
            email: email || null,
            gst_number: gst_number || null
        })
    })

    const data = await res.json()

    if(res.ok){

        customers.push(data)

        customerSelect.innerHTML += `<option value="${data.id}">${data.name}</option>`
        customerSelect.value = data.id

        custName.value = ""
        custPhone.value = ""
        custEmail.value = ""
        custGST.value = ""

        bootstrap.Modal.getInstance(customerModal).hide()

        showAlert("Customer added successfully", "success")

    }else{
        showAlert(data.detail || "Error creating customer", "error")
    }

}

/* ===============================
LOAD CUSTOMERS
=============================== */
async function loadCustomers(){

    const res = await fetch("/api/customers/")
    customers = await res.json()

    customerSelect.innerHTML = `<option value="">Select Customer</option>`

    customers.forEach(c=>{
        customerSelect.innerHTML += `<option value="${c.id}">${c.name}</option>`
    })

}

/* ===============================
LOAD ITEMS
=============================== */
async function loadItems(){

    const res = await fetch("/api/items")
    const data = await res.json()

    items = data.map(i => ({
        ...i,
        stock: i.stock ?? 0
    }))

}

/* ===============================
ADD ROW
=============================== */
function addRow(){

    if(items.length === 0){
        showAlert("No items found", "warning")
        return
    }

    const tbody = document.querySelector("#salesTable tbody")

	const options = items.map(i=>`
	<option value="${i.id}" 
	data-price="${Number(i.selling_price) || 0}" 
	data-gst="${Number(i.gst_rate) || 0}" 
	data-stock="${Number(i.stock) || 0}"
	${i.stock <= 0 ? 'disabled' : ''}>
	${i.name} (${i.stock <= 0 ? 'Out of Stock' : 'Stock: ' + i.stock})
	</option>
	`).join("")

    const row = document.createElement("tr")

    row.innerHTML = `
    <td>
    <select class="form-select item-select" onchange="itemChanged(this)">
    <option value="">Select Item</option>
    ${options}
    </select>
    </td>

    <td>
    <input type="number" class="form-control qty" value="1" min="1" oninput="validateQty(this)">
    </td>

    <td>
    <input type="number" class="form-control price" value="0" step="0.01" oninput="calculateRow(this)">
    </td>

    <td>
    <input type="number" class="form-control gst" value="0" step="0.01" oninput="calculateRow(this)">
    </td>

    <td class="rowTotal">0.00</td>

    <td>
    <button class="btn btn-sm btn-danger" onclick="removeRow(this)">✕</button>
    </td>
    `

    tbody.appendChild(row)

}

/* ===============================
ITEM SELECT
=============================== */
function itemChanged(select){

    const row = select.closest("tr")
    const option = select.options[select.selectedIndex]

    const price = parseFloat(option.getAttribute("data-price")) || 0
    const gst = parseFloat(option.getAttribute("data-gst")) || 0
    const stock = parseInt(option.getAttribute("data-stock")) || 0

    row.querySelector(".price").value = price
    row.querySelector(".gst").value = gst
    row.querySelector(".qty").max = stock

    calculateRow(row.querySelector(".price"))
}

/* ===============================
VALIDATE QTY
=============================== */
function validateQty(input){

    const max = Number(input.max || 0)

    if(Number(input.value) > max){
        input.value = max
        showAlert("Cannot exceed available stock", "error")
    }

    calculateRow(input)

}

/* ===============================
REMOVE ROW
=============================== */
function removeRow(btn){
    btn.closest("tr").remove()
    calculateTotals()
}

/* ===============================
ROW CALCULATION
=============================== */
function calculateRow(input){

    const row = input.closest("tr")

    const qty = Number(row.querySelector(".qty").value)
    const price = Number(row.querySelector(".price").value)
    const gst = Number(row.querySelector(".gst").value)

    const subtotal = qty * price
    const tax = subtotal * gst / 100
    const total = subtotal + tax

    row.querySelector(".rowTotal").innerText = total.toFixed(2)

    calculateTotals()

}

/* ===============================
TOTAL CALCULATION
=============================== */
function calculateTotals(){

    let subtotal = 0
    let taxTotal = 0

    document.querySelectorAll("#salesTable tbody tr").forEach(row=>{

        const qty = Number(row.querySelector(".qty").value)
        const price = Number(row.querySelector(".price").value)
        const gst = Number(row.querySelector(".gst").value)

        const sub = qty * price
        const tax = sub * gst / 100

        subtotal += sub
        taxTotal += tax

    })

    document.getElementById("subtotal").innerText = subtotal.toFixed(2)
    document.getElementById("taxTotal").innerText = taxTotal.toFixed(2)
    document.getElementById("grandTotal").innerText = (subtotal + taxTotal).toFixed(2)

}

/* ===============================
SAVE SALES
=============================== */
async function saveSales(){

    if(!customerSelect.value){
        showAlert("Select customer", "warning")
        return
    }

    let invoiceItems = []

    document.querySelectorAll("#salesTable tbody tr").forEach(row=>{

        const item = row.querySelector(".item-select").value

        if(item){
            invoiceItems.push({
                item_id:Number(item),
                quantity:Number(row.querySelector(".qty").value),
                price:Number(row.querySelector(".price").value),
                gst_rate:Number(row.querySelector(".gst").value)
            })
        }

    })

    if(invoiceItems.length === 0){
        showAlert("Add items first", "warning")
        return
    }

    /* CONFIRM */
    const confirm = await Swal.fire({
        title: "Save Invoice?",
        text: "Do you want to create this invoice?",
        icon: "question",
        showCancelButton: true,
        confirmButtonText: "Yes, Save",
        cancelButtonText: "Cancel"
    })

    if(!confirm.isConfirmed) return

    const res = await fetch("/api/sales/",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({
            customer_id:Number(customerSelect.value),
            invoice_date:invoiceDate.value,
            items:invoiceItems
        })
    })

    const data = await res.json()

    if(!res.ok){
        showAlert(data.detail || "Error", "error")
        return
    }

    Swal.fire({
        title: "Success!",
        text: "Invoice Created Successfully",
        icon: "success",
        timer: 1500,
        showConfirmButton: false
    })

    setTimeout(()=>{
        window.location.href="/sales"
    }, 1500)

}

/* ===============================
INIT
=============================== */
document.addEventListener("DOMContentLoaded", async function(){

    invoiceDate.value = new Date().toISOString().split("T")[0]

    await loadCustomers()
    await loadItems()

    addRow()

})

</script>

{% endblock %}
