{% extends "ProBook/Base/base.html" %}

{% block title %}Create Sales Return{% endblock %}

{% block content %}

<div class="content">

<h3 class="mb-4">Create Sales Return</h3>

<div class="card">
<div class="card-body">

<div class="row mb-3">

<div class="col-md-4">
<label>Invoice ID</label>
<input type="number" id="invoice_id" class="form-control">
</div>

<div class="col-md-4">
<label>Return Date</label>
<input type="date" id="return_date" class="form-control">
</div>

</div>

<table class="table table-bordered">

<thead>
<tr>
<th>Invoice Item</th>
<th>Item</th>
<th>Qty</th>
<th>Price</th>
<th>GST%</th>
</tr>
</thead>

<tbody id="itemsBody">

<tr>

<td><input class="form-control invoice_item_id"></td>
<td><input class="form-control item_id"></td>
<td><input class="form-control qty"></td>
<td><input class="form-control price"></td>
<td><input class="form-control gst"></td>

</tr>

</tbody>

</table>

<br>
<button class="btn btn-secondary mb-3" onclick="addRow()">Add Item</button>
<button class="btn btn-primary" onclick="submitReturn()">Submit</button>

</div>
</div>

</div>

<script>

function addRow(){

const row = `
<tr>
<td><input class="form-control invoice_item_id"></td>
<td><input class="form-control item_id"></td>
<td><input class="form-control qty"></td>
<td><input class="form-control price"></td>
<td><input class="form-control gst"></td>
</tr>
`

document.getElementById("itemsBody")
.insertAdjacentHTML("beforeend", row)

}

async function submitReturn(){

const rows = document.querySelectorAll("#itemsBody tr")

let items = []

rows.forEach(r=>{

items.push({

invoice_item_id:r.querySelector(".invoice_item_id").value,
item_id:r.querySelector(".item_id").value,
quantity:r.querySelector(".qty").value,
price:r.querySelector(".price").value,
gst_rate:r.querySelector(".gst").value

})

})

const payload = {

invoice_id:document.getElementById("invoice_id").value,
return_date:document.getElementById("return_date").value,
items:items

}

await fetch("/api/sales-return",{

method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify(payload)

})

alert("Sales Return Created")

window.location.href="/sales-returns"

}

</script>

{% endblock %}
