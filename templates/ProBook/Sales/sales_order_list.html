{% extends "ProBook/Base/base.html" %}

{% block title %}Sales Orders{% endblock %}

{% block content %}

<div class="content">

<div class="d-flex justify-content-between mb-4">
<h3>Sales Orders</h3>

<a href="/sales/order/create" class="btn btn-primary">
Create Sales Order
</a>
</div>

<div class="card">
<div class="card-body">

<table class="table table-bordered">

<thead>
<tr>
<th width="150">SO Number</th>
<th width="150">Date</th>
<th style="width:180px;">Customer</th>
<th width="150">Total</th>
<th width="120">Status</th>
<th width="220" class="text-center">Action</th>
</tr>
</thead>

<tbody id="soBody">

<tr>
<td colspan="6" class="text-center text-muted">
Loading sales orders...
</td>
</tr>

</tbody>

</table>

</div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>

/* =========================
LOAD SALES ORDERS
========================= */

async function loadSO(){

    const body = document.getElementById("soBody")

    try{

        const res = await fetch("/api/sales-orders/")
        const data = await res.json()

        console.log("Sales Orders:", data)

        body.innerHTML = ""

        if(!Array.isArray(data) || data.length === 0){
            body.innerHTML = `
            <tr>
                <td colspan="6" class="text-center text-muted">
                    No sales orders found
                </td>
            </tr>`
            return
        }

        let rows = ""

        data.forEach(so => {

            const total = Number(so.total_amount ?? 0)

            const statusClass =
                so.status === "CONFIRMED" ? "bg-success" :
                so.status === "PENDING" ? "bg-warning text-dark" :
                so.status === "CANCELLED" ? "bg-danger" :
                "bg-secondary"

            rows += `
            <tr>

                <td>
                    <a href="/sales/order/${so.id}">
                        ${so.so_number || ""}
                    </a>
                </td>

                <td>${so.order_date || ''}</td>

                <td>${so.customer_name || so.customer_id || ''}</td>

                <td class="text-end">
                    ${total.toFixed(2)}
                </td>

                <td>
                    <span class="badge ${statusClass}">
                        ${so.status || "PENDING"}
                    </span>
                </td>

				<td class="text-center">
				
					<div class="d-flex justify-content-center flex-wrap gap-1">
				
						<a href="/sales/order/${so.id}"
						class="btn btn-sm btn-info">
						View
						</a>
				
						${
							so.status === "PENDING"
							? `<a href="/sales/order/${so.id}"
							class="btn btn-sm btn-warning">
							Edit
							</a>`
							: `<button class="btn btn-sm btn-secondary" disabled>
							Edit
							</button>`
						}
				
						${
							so.status === "PENDING"
							? `<button class="btn btn-sm btn-success"
								onclick="confirmSO(${so.id})">
								Confirm
							</button>`
							: ""
						}
				
					</div>
				
				</td>

            </tr>`
        })

        body.innerHTML = rows

    }catch(err){

        console.error(err)

        body.innerHTML = `
        <tr>
            <td colspan="6" class="text-center text-danger">
                Error loading sales orders
            </td>
        </tr>`

        Swal.fire({
            icon:"error",
            title:"Error",
            text:"Unable to load sales orders"
        })
    }
}


/* =========================
CONFIRM ORDER
========================= */

async function confirmSO(id){

    const confirm = await Swal.fire({
        title: "Confirm Order?",
        text: "This will move order to Delivery",
        icon: "question",
        showCancelButton: true,
        confirmButtonText: "Yes, Confirm"
    })

    if(!confirm.isConfirmed) return

    try{

        const res = await fetch(`/api/sales-orders/${id}/confirm`, {
            method: "PUT"
        })

        if(res.ok){
            Swal.fire("Order Confirmed!", "", "success")
            loadSO()
        }else{
            throw new Error()
        }

    }catch(err){
        Swal.fire("Error confirming order","","error")
    }
}


/* =========================
PAGE INIT
========================= */

document.addEventListener("DOMContentLoaded", function(){
    loadSO()
})

</script>

{% endblock %}
