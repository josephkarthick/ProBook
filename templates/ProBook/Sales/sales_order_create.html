{% extends "ProBook/Base/base.html" %}
{% block title %}Sales Order | ProBook{% endblock %}

{% block content %}

<div class="content">

<div class="d-flex justify-content-between mb-4">
<div>
<h3>Sales Order</h3>
<p class="text-muted mb-0">Create and manage customer orders.</p>
</div>

<button class="btn btn-success" onclick="saveSales()">Save Order</button>
</div>

<div class="card">
<div class="card-body">

<div class="row mb-4">

<div class="col-md-6">
<label>Customer</label>
<div class="d-flex">
<select class="form-select me-2" id="customerSelect"></select>
<button class="btn btn-primary" onclick="openCustomerModal()">+</button>
</div>
</div>

<div class="col-md-4">
<label>Order Date</label>
<input type="date" id="invoiceDate" class="form-control">
</div>

</div>

<table class="table table-bordered" id="salesTable">
<thead>
<tr>
<th>Item</th>
<th>Qty</th>
<th>Price</th>
<th>GST %</th>
<th>Total</th>
<th></th>
</tr>
</thead>
<tbody></tbody>
</table>
<br>
<button class="btn btn-sm btn-primary" onclick="addRow()">+ Add Item</button>

<hr>

<div class="row justify-content-end">
<div class="col-md-4">
<table class="table">
<tr><th>Subtotal</th><td id="subtotal">0.00</td></tr>
<tr><th>GST</th><td id="taxTotal">0.00</td></tr>
<tr class="fw-bold"><th>Total</th><td id="grandTotal">0.00</td></tr>
</table>
</div>
</div>

</div>
</div>

</div>

<!-- Customer Modal -->
<div class="modal fade" id="customerModal">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5>Add Customer</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">
<input class="form-control mb-2" id="custName" placeholder="Customer Name *">
<input class="form-control mb-2" id="custPhone" placeholder="Phone">
<input class="form-control mb-2" id="custEmail" placeholder="Email">
<input class="form-control mb-2" id="custGST" placeholder="GST Number">
</div>

<div class="modal-footer">
<button class="btn btn-success" onclick="saveCustomer()">Save</button>
</div>

</div>
</div>
</div>

<script>
let items = [];

const customerSelect = document.getElementById("customerSelect");
const invoiceDate = document.getElementById("invoiceDate");

/* ================= INIT ================= */
document.addEventListener("DOMContentLoaded", async () => {

    invoiceDate.value = new Date().toISOString().split("T")[0];

    await loadCustomers();
    await loadItems();

    addRow();
});

/* ================= LOAD ================= */

async function loadCustomers(){
    const res = await fetch("/api/customers/");
    const data = await res.json();

    customerSelect.innerHTML = '<option value="">Select Customer</option>';
    data.forEach(c=>{
        customerSelect.innerHTML += `<option value="${c.id}">${c.name}</option>`;
    });
}

async function loadItems(){
    const res = await fetch("/api/items");
    items = await res.json();
}

/* ================= ROW ================= */

function addRow(){

    const options = items.map(i => 
        `<option value="${i.id}" 
            data-price="${i.selling_price}" 
            data-gst="${i.gst_rate}"
            data-stock="${i.stock || 0}">
            ${i.name} (Stock: ${i.stock || 0})
        </option>`
    ).join("");

    const row = document.createElement("tr");

    row.innerHTML = `
    <td>
        <select class="form-select item-select">
            <option value="">Select Item</option>
            ${options}
        </select>
    </td>

    <td>
        <input type="number" class="form-control qty" value="1" min="1">
        <small class="text-muted stock-label"></small>
    </td>

    <td><input type="number" class="form-control price" step="0.01"></td>
    <td><input type="number" class="form-control gst" step="0.01"></td>

    <td class="rowTotal">0.00</td>

    <td><button class="btn btn-danger btn-sm">X</button></td>
    `;

    /* EVENTS */
    row.querySelector(".item-select").addEventListener("change", function(){
        itemChanged(this);
    });

    row.querySelector(".qty").addEventListener("input", function(){
        validateStock(this);
        calculateRow(this);
    });

    row.querySelector(".price").addEventListener("input", function(){
        calculateRow(this);
    });

    row.querySelector(".gst").addEventListener("input", function(){
        calculateRow(this);
    });

    row.querySelector("button").addEventListener("click", function(){
        row.remove();
        calculateTotals();
    });

    document.querySelector("#salesTable tbody").appendChild(row);
}

/* ================= ITEM CHANGE ================= */

function itemChanged(select){

    const row = select.closest("tr");
    const opt = select.options[select.selectedIndex];

    if(!opt || !opt.value){
        return;
    }

    const price = opt.getAttribute("data-price");
    const gst = opt.getAttribute("data-gst");
    const stock = Number(opt.getAttribute("data-stock") || 0);

    row.querySelector(".price").value = price || 0;
    row.querySelector(".gst").value = gst || 0;

    row.dataset.stock = stock;

    row.querySelector(".stock-label").innerText = `Available: ${stock}`;

    validateStock(row.querySelector(".qty"));
    calculateRow(select);
}

/* ================= STOCK VALIDATION ================= */

function validateStock(input){

    const row = input.closest("tr");
    const stock = Number(row.dataset.stock || 0);
    const qty = Number(input.value || 0);

    if(qty > stock){

        input.value = stock;

        Swal.fire({
            icon: "warning",
            text: `Only ${stock} items available in stock`
        });

        row.querySelector(".qty").classList.add("is-invalid");
    }else{
        row.querySelector(".qty").classList.remove("is-invalid");
    }
}

/* ================= ROW CALC ================= */

function calculateRow(input){

    const row = input.closest("tr");

    const qty = Number(row.querySelector(".qty").value) || 0;
    const price = Number(row.querySelector(".price").value) || 0;
    const gst = Number(row.querySelector(".gst").value) || 0;

    const sub = qty * price;
    const tax = sub * gst / 100;

    row.querySelector(".rowTotal").innerText = (sub + tax).toFixed(2);

    calculateTotals();
}

/* ================= TOTAL ================= */

function calculateTotals(){

    let sub = 0;
    let tax = 0;

    document.querySelectorAll("#salesTable tbody tr").forEach(row=>{
        const qty = Number(row.querySelector(".qty").value) || 0;
        const price = Number(row.querySelector(".price").value) || 0;
        const gst = Number(row.querySelector(".gst").value) || 0;

        const rowSub = qty * price;
        const rowTax = rowSub * gst / 100;

        sub += rowSub;
        tax += rowTax;
    });

    subtotal.innerText = sub.toFixed(2);
    taxTotal.innerText = tax.toFixed(2);
    grandTotal.innerText = (sub + tax).toFixed(2);
}

/* ================= SAVE ================= */

async function saveSales(){

    if(!customerSelect.value){
        Swal.fire("Select customer","","warning");
        return;
    }

    let itemsData = [];
    let hasError = false;

    document.querySelectorAll("#salesTable tbody tr").forEach(row=>{
        const id = row.querySelector(".item-select").value;
        const qty = Number(row.querySelector(".qty").value);
        const stock = Number(row.dataset.stock || 0);

        if(qty > stock){
            hasError = true;
        }

        if(id){
            itemsData.push({
                item_id: Number(id),
                quantity: qty,
                price: Number(row.querySelector(".price").value),
                gst_rate: Number(row.querySelector(".gst").value)
            });
        }
    });

    if(hasError){
        Swal.fire("Stock exceeded!","","error");
        return;
    }

    if(itemsData.length === 0){
        Swal.fire("Add items first","","warning");
        return;
    }

    // ✅ ALWAYS SALES ORDER API
    const res = await fetch("/api/sales-orders/", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            customer_id:Number(customerSelect.value),
            order_date:invoiceDate.value,
            items:itemsData
        })
    });

    if(res.ok){
        Swal.fire("Sales Order Created","","success");
        setTimeout(()=>location.href="/sales/order",1000);
    }else{
        Swal.fire("Error","","error");
    }
}
</script>

{% endblock %}
