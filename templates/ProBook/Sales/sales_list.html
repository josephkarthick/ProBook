{% extends "ProBook/Base/base.html" %}

{% block title %}Sales Invoices | ProBook{% endblock %}

{% block content %}

<div class="content">

<!-- ================= HEADER ================= -->
<div class="d-flex justify-content-between mb-4">
    <h3>Sales Invoices</h3>

    <a href="/sales/invoice/create" class="btn btn-primary">
        <i class="icon-plus-circle me-1"></i> Create Invoice
    </a>
</div>


    <!-- ================= TABLE ================= -->
    <div class="card">
        <div class="card-body">

            <div class="table-responsive">
                <table class="table table-bordered">

                    <thead>
                        <tr>
                            <th>Invoice No</th>
                            <th>Date</th>
                            <th>Customer</th>
                            <th>Total</th>
                            <th>Status</th>
                            <th width="180">Actions</th>
                        </tr>
                    </thead>

                    <tbody id="salesBody">
                        <tr>
                            <td colspan="6" class="text-center text-muted">
                                Loading sales invoices...
                            </td>
                        </tr>
                    </tbody>

                </table>
            </div>

        </div>
    </div>

</div>


<script>

/* ================= CHECK ACTIVE COMPANY ================= */
async function checkCompany() {

    const res = await fetch("/api/companies/active");
    const data = await res.json();

    if (!data.company_id) {
        alert("Please select a company first");
        window.location.href = "/company";
        return false;
    }

    return true;
}


/* ================= LOAD SALES ================= */
async function loadSales() {

    const res = await fetch("/api/sales/");
    const data = await res.json();

    const body = document.getElementById("salesBody");
    body.innerHTML = "";

    if (!data.length) {
        body.innerHTML = `
            <tr>
                <td colspan="6" class="text-center text-muted">
                    No sales invoices found
                </td>
            </tr>
        `;
        return;
    }

    data.forEach(s => {

        // ================= STATUS COLOR =================
        let statusClass = "bg-danger";

        if (s.payment_status === "PAID") {
            statusClass = "bg-success";
        } else if (s.payment_status === "PARTIAL") {
            statusClass = "bg-warning";
        }

        // ================= PAY BUTTON =================
        let payBtn = "";

        if (s.payment_status !== "PAID") {
            payBtn = `
                <a href="/sales-view/${s.id}" 
                   class="btn btn-sm btn-success">
                    Pay
                </a>
            `;
        }

        body.innerHTML += `
            <tr>

                <td>${s.invoice_no}</td>
                <td>${s.invoice_date}</td>
                <td>${s.customer_name || ''}</td>
                <td>${Number(s.grand_total).toFixed(2)}</td>

                <td>
                    <span class="badge ${statusClass}">
                        ${s.payment_status}
                    </span>
                </td>

                <td>

                    <a href="/sales-view/${s.id}" 
                       class="btn btn-sm btn-info me-1">
                        <i class="icon-eye"></i>
                    </a>

                    <a href="/sales-print/${s.id}" 
                       class="btn btn-sm btn-secondary me-1">
                        <i class="icon-printer"></i>
                    </a>

                    ${payBtn}

                </td>

            </tr>
        `;
    });
}


/* ================= INIT ================= */
document.addEventListener("DOMContentLoaded", async function () {

    const ok = await checkCompany();
    if (!ok) return;

    loadSales();

});

</script>

{% endblock %}
