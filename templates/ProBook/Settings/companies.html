{% extends "ProBook/Base/base.html" %}
{% block title %}Companies | VaisKart{% endblock %}
{% block content %}

<div class="content">

    <div class="d-flex justify-content-between mb-4">
        <h3>Companies</h3>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#companyModal">
            Add Company
        </button>
    </div>

    <div class="card">
        <div class="card-body">
            <table class="table table-bordered">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th width="120">Action</th>
                    </tr>
                </thead>
                <tbody id="companyBody">
                    <tr>
                        <td colspan="4" class="text-center text-muted">
                            Loading...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<!-- Modal -->
<div class="modal fade" id="companyModal">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Company</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <input type="hidden" id="companyId">

                <div class="mb-3">
                    <label>Name</label>
                    <input type="text" id="companyName" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" id="companyEmail" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Phone</label>
                    <input type="text" id="companyPhone" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Address</label>
                    <textarea id="companyAddress" class="form-control"></textarea>
                </div>

            </div>

            <div class="modal-footer">
                <button class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-success" onclick="saveCompany()">Save</button>
            </div>

        </div>
    </div>
</div>

<script>

async function loadCompanies() {
    const res = await fetch("/companies/");
    const data = await res.json();

    const body = document.getElementById("companyBody");
    body.innerHTML = "";

    data.forEach(c => {
        body.innerHTML += `
            <tr>
                <td>${c.name}</td>
                <td>${c.email || ''}</td>
                <td>${c.phone || ''}</td>
                <td>
                    <span class="badge bg-success">
                        ${c.status}
                    </span>
                </td>
                <td>
                    <button class="btn btn-sm btn-info me-1"
                        onclick="editCompany(${c.id})">
                        <i class="icon-pencil"></i>
                    </button>
                    <button class="btn btn-sm btn-danger"
                        onclick="deleteCompany(${c.id})">
                        <i class="icon-trash"></i>
                    </button>
                </td>
            </tr>
        `;
    });
}

async function saveCompany() {

    const id = document.getElementById("companyId").value;

    const payload = {
        name: document.getElementById("companyName").value,
        email: document.getElementById("companyEmail").value,
        phone: document.getElementById("companyPhone").value,
        address: document.getElementById("companyAddress").value
    };

    if (id) {
        await fetch(`/companies/${id}`, {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(payload)
        });
    } else {
        await fetch("/companies/", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(payload)
        });
    }

    bootstrap.Modal.getInstance(document.getElementById("companyModal")).hide();
    loadCompanies();
}

async function editCompany(id) {
    const res = await fetch(`/companies/`);
    const companies = await res.json();
    const c = companies.find(x => x.id === id);

    document.getElementById("companyId").value = c.id;
    document.getElementById("companyName").value = c.name;
    document.getElementById("companyEmail").value = c.email;
    document.getElementById("companyPhone").value = c.phone;
    document.getElementById("companyAddress").value = c.address;

    new bootstrap.Modal(document.getElementById("companyModal")).show();
}

async function deleteCompany(id) {
    if (!confirm("Delete this company?")) return;
    await fetch(`/companies/${id}`, { method: "DELETE" });
    loadCompanies();
}

document.addEventListener("DOMContentLoaded", loadCompanies);

async function editCompany(id) {
    const res = await fetch(`/companies/${id}`);
    const c = await res.json();

    document.getElementById("companyId").value = c.id;
    document.getElementById("companyName").value = c.name;
    document.getElementById("companyEmail").value = c.email || '';
    document.getElementById("companyPhone").value = c.phone || '';
    document.getElementById("companyAddress").value = c.address || '';

    new bootstrap.Modal(document.getElementById("companyModal")).show();
}

</script>

{% endblock %}
