{% extends "ProBook/Base/base.html" %}

{% block title %}Companies{% endblock %}

{% block content %}

<div class="content">

<div class="d-flex justify-content-between mb-4">

<h3>Company Management</h3>

<button class="btn btn-primary"
data-bs-toggle="modal"
data-bs-target="#companyModal">

<i class="icon-plus"></i> Add Company

</button>

</div>


<div class="card">
<div class="card-body">

<table class="table table-bordered">

<thead>
<tr>
<th>Name</th>
<th>Code</th>
<th>Email</th>
<th>Phone</th>
<th width="120">Action</th>
</tr>
</thead>

<tbody id="companyTable">

<tr>
<td colspan="5" class="text-center text-muted">
Loading companies...
</td>
</tr>

</tbody>

</table>

</div>
</div>

</div>



<!-- CREATE COMPANY MODAL -->

<div class="modal fade" id="companyModal">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">
<h5 class="modal-title">Create Company</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>


<div class="modal-body">

<div class="mb-3">
<label>Company Name</label>
<input type="text" id="name" class="form-control">
</div>

<div class="mb-3">
<label>Company Code</label>
<input type="text" id="code" class="form-control">
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" id="email" class="form-control">
</div>

<div class="mb-3">
<label>Phone</label>
<input type="text" id="phone" class="form-control">
</div>

<div class="mb-3">
<label>GST Number</label>
<input type="text" id="gst_number" class="form-control">
</div>

</div>


<div class="modal-footer">

<button class="btn btn-light"
data-bs-dismiss="modal">

Cancel

</button>

<button class="btn btn-success"
onclick="createCompany()">

Create

</button>

</div>

</div>
</div>

</div>



<script>

/* =========================
LOAD COMPANIES
========================= */

async function loadCompanies(){

const res = await fetch("/api/companies/")
const companies = await res.json()

const table = document.getElementById("companyTable")

table.innerHTML = ""

companies.forEach(c => {

table.innerHTML += `
<tr>

<td>${c.name}</td>
<td>${c.code}</td>
<td>${c.email || ""}</td>
<td>${c.phone || ""}</td>

<td>

<button class="btn btn-sm btn-success"
onclick="switchCompany(${c.id})">

Use

</button>

</td>

</tr>
`

})

}



/* =========================
CREATE COMPANY
========================= */

async function createCompany(){

const payload = {

name: document.getElementById("name").value,
code: document.getElementById("code").value,
email: document.getElementById("email").value,
phone: document.getElementById("phone").value,
gst_number: document.getElementById("gst_number").value

}

const res = await fetch("/api/companies/",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify(payload)

})

if(res.ok){

bootstrap.Modal.getInstance(
document.getElementById("companyModal")
).hide()

loadCompanies()

}

}



/* =========================
SWITCH COMPANY
========================= */

async function switchCompany(id){

await fetch(`/api/companies/switch/${id}`,{
method:"POST"
})

location.reload()

}



/* =========================
INIT
========================= */

document.addEventListener("DOMContentLoaded", loadCompanies)

</script>

{% endblock %}
