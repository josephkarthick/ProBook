<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Login | ProBook ERP</title>

<link rel="stylesheet" href="/static/assets/css/bootstrap.min.css">

<style>

body{
    background: linear-gradient(135deg,#4f46e5,#3b82f6);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family: 'Segoe UI',sans-serif;
}

.login-card{
    width:380px;
    padding:40px;
    border-radius:12px;
    background:#fff;
    box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo h3{
    font-weight:700;
    color:#4f46e5;
}

.form-control{
    height:45px;
    border-radius:8px;
}

.btn-login{
    width:100%;
    height:45px;
    border-radius:8px;
    background:#4f46e5;
    border:none;
    font-weight:600;
}

.btn-login:hover{
    background:#4338ca;
}

.footer-text{
    text-align:center;
    margin-top:15px;
    font-size:13px;
    color:#777;
}

</style>

</head>

<body>

<div class="login-card">

<div class="logo">
<h3>ProBook ERP</h3>
<p class="text-muted">Login to your account</p>
</div>

<form method="post" action="/login">

<div class="mb-3">
<label class="form-label">Username</label>
<input type="text" name="username" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Password</label>
<input type="password" name="password" class="form-control" required>
</div>

{% if error %}
<div class="alert alert-danger">
{{ error }}
</div>
{% endif %}

<button class="btn btn-login text-white">
Login
</button>

</form>

<div class="footer-text">
© 2026 ProBook ERP
</div>

</div>

</body>
</html>
