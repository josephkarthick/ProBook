{% extends "ProBook/Base/base.html" %}

{% block title %}Stock Ledger | ProBook{% endblock %}

{% block content %}

<div class="content">

<div class="d-flex justify-content-between mb-4">
    <h3>Stock Ledger</h3>
</div>

<div class="card shadow-sm">
<div class="card-body">

<!-- FILTERS -->
<div class="row mb-4">

<div class="col-md-4">
<label>Item</label>
<select class="form-select" id="itemSelect"></select>
</div>

<div class="col-md-3">
<label>From Date</label>
<input type="date" class="form-control" id="fromDate">
</div>

<div class="col-md-3">
<label>To Date</label>
<input type="date" class="form-control" id="toDate">
</div>

<div class="col-md-2 d-flex align-items-end">
<button class="btn btn-primary w-100" onclick="loadStockLedger()">
Load
</button>
</div>

</div>

<!-- TABLE -->
<div class="table-responsive">

<table class="table table-bordered table-hover align-middle">

<thead class="table-light">
<tr>
<th>Date</th>
<th>Reference</th>
<th class="text-end text-success">IN</th>
<th class="text-end text-danger">OUT</th>
<th class="text-end">Balance</th>
</tr>
</thead>

<tbody id="stockBody">
<tr>
<td colspan="5" class="text-center text-muted">
Select item to view stock ledger
</td>
</tr>
</tbody>

</table>

</div>

</div>
</div>

</div>

<script>

let items = []

/* ======================
CHECK COMPANY
====================== */
async function checkCompany(){

    const res = await fetch("/api/companies/active")
    const data = await res.json()

    if(!data.company_id){
        alert("Please select company first")
        window.location.href="/company"
        return false
    }

    return true
}


/* ======================
LOAD ITEMS
====================== */
async function loadItems(){

    const res = await fetch("/api/items")
    items = await res.json()

    const select = document.getElementById("itemSelect")

    select.innerHTML = `<option value="">Select Item</option>`

    items.forEach(i => {
        select.innerHTML += `<option value="${i.id}">${i.name}</option>`
    })
}


/* ======================
LOAD LEDGER
====================== */
async function loadStockLedger(){

    const item_id = document.getElementById("itemSelect").value
    const fromDate = document.getElementById("fromDate").value
    const toDate = document.getElementById("toDate").value

    if(!item_id){
        alert("Please select item")
        return
    }

    try {

        const res = await fetch(`/stock/ledger/${item_id}?from_date=${fromDate}&to_date=${toDate}`)
        const data = await res.json()

        const body = document.getElementById("stockBody")
        body.innerHTML = ""

        if(!data.length){
            body.innerHTML = `
            <tr>
                <td colspan="5" class="text-center text-muted">
                    No stock movement found
                </td>
            </tr>`
            return
        }

        let balance = 0

        data.forEach(row => {

            const qtyIn = Number(row.qty_in || 0)
            const qtyOut = Number(row.qty_out || 0)

            balance += qtyIn - qtyOut

            body.innerHTML += `
            <tr>
                <td>${row.date}</td>
                <td>${row.reference || "-"}</td>
                <td class="text-end text-success">${qtyIn.toFixed(2)}</td>
                <td class="text-end text-danger">${qtyOut.toFixed(2)}</td>
                <td class="text-end fw-bold">${balance.toFixed(2)}</td>
            </tr>`
        })

    } catch (err) {
        console.error(err)
        alert("Error loading stock ledger")
    }
}


/* ======================
INIT
====================== */
document.addEventListener("DOMContentLoaded", async function(){

    const ok = await checkCompany()
    if(!ok) return

    await loadItems()

    document.getElementById("fromDate").value = "2026-01-01"
    document.getElementById("toDate").value = "2026-12-31"

})
</script>

{% endblock %}
