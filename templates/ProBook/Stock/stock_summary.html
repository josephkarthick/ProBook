{% extends "ProBook/Base/base.html" %}

{% block title %}Stock Summary | ProBook{% endblock %}

{% block content %}

<div class="content">

<div class="d-flex justify-content-between mb-4">

    <h3>Stock Summary</h3>

    <div>
        <button class="btn btn-success me-2" onclick="openAdjustmentModal()">
            Adjust Stock
        </button>

        <button class="btn btn-primary" onclick="loadStock()">
            Refresh
        </button>
    </div>

</div>

<div class="card shadow-sm">
<div class="card-body">

<div class="table-responsive">

<table class="table table-bordered table-hover align-middle">

<thead class="table-light">
<tr>
<th>Item</th>
<th class="text-end">Stock Qty</th>
<th class="text-end">Avg Cost</th>
<th class="text-end">Stock Value</th>
</tr>
</thead>

<tbody id="stockBody">
<tr>
<td colspan="4" class="text-center text-muted">
Loading stock...
</td>
</tr>
</tbody>

</table>

</div>

</div>
</div>

</div>


<!-- ===============================
STOCK ADJUSTMENT MODAL
=============================== -->
<div class="modal fade" id="adjustModal" tabindex="-1">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5 class="modal-title">Stock Adjustment</h5>
<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<div class="mb-3">
<label>Item</label>
<select class="form-select" id="adjItem"></select>
</div>

<div class="mb-3">
<label>Quantity</label>
<input type="number" step="0.01" class="form-control" id="adjQty">
</div>

<div class="mb-3">
<label>Type</label>
<select class="form-select" id="adjType">
<option value="IN">Increase (IN)</option>
<option value="OUT">Decrease (OUT)</option>
</select>
</div>

<div class="mb-3">
<label>Reason</label>
<input type="text" class="form-control" id="adjReason">
</div>

</div>

<div class="modal-footer">
<button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
<button class="btn btn-success" onclick="saveAdjustment()">Save</button>
</div>

</div>
</div>
</div>


<script>

/* ======================
CHECK COMPANY
====================== */
async function checkCompany(){
    const res = await fetch("/api/companies/active")
    const data = await res.json()

    if(!data.company_id){
        alert("Please select company first")
        window.location.href="/company"
        return false
    }
    return true
}


/* ======================
LOAD STOCK SUMMARY
====================== */
async function loadStock(){

    try {

        const res = await fetch("/api/stock/summary")
        const result = await res.json()

        const data = result.data || []

        const body = document.getElementById("stockBody")
        body.innerHTML = ""

        if(!data.length){
            body.innerHTML = `
            <tr>
                <td colspan="4" class="text-center text-muted">
                    No stock available
                </td>
            </tr>`
            return
        }

        data.forEach(row => {

            const qty = Number(row.qty || 0)
            const avg = Number(row.avg_cost || 0)
            const val = Number(row.stock_value || 0)

            body.innerHTML += `
            <tr>
                <td>${row.item_name}</td>
                <td class="text-end">${qty.toFixed(2)}</td>
                <td class="text-end">₹ ${avg.toFixed(2)}</td>
                <td class="text-end fw-bold">₹ ${val.toFixed(2)}</td>
            </tr>`
        })

    } catch (err) {
        console.error(err)
        alert("Error loading stock summary")
    }
}


/* ======================
LOAD ITEMS (FOR MODAL)
====================== */
async function loadItemsForAdjustment(){

    const res = await fetch("/api/items")
    const items = await res.json()

    const select = document.getElementById("adjItem")

    select.innerHTML = `<option value="">Select Item</option>`

    items.forEach(i => {
        select.innerHTML += `
        <option value="${i.id}">
            ${i.name}
        </option>`
    })
}


/* ======================
OPEN MODAL
====================== */
function openAdjustmentModal(){

    loadItemsForAdjustment()

    document.getElementById("adjQty").value = ""
    document.getElementById("adjReason").value = ""

    const modal = new bootstrap.Modal(document.getElementById("adjustModal"))
    modal.show()
}


/* ======================
SAVE ADJUSTMENT
====================== */
async function saveAdjustment(){

    const item_id = document.getElementById("adjItem").value
    const qty = document.getElementById("adjQty").value
    const type = document.getElementById("adjType").value
    const reason = document.getElementById("adjReason").value

    if(!item_id || !qty){
        alert("Please fill required fields")
        return
    }

    try {

        const res = await fetch("/api/stock/adjustment", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                item_id: item_id,
                qty: qty,
                type: type,
                reason: reason
            })
        })

        const data = await res.json()

        alert("Stock adjusted successfully ✅")

        // close modal
        bootstrap.Modal.getInstance(document.getElementById("adjustModal")).hide()

        // refresh table
        loadStock()

    } catch (err){
        console.error(err)
        alert("Error saving adjustment")
    }
}


/* ======================
INIT
====================== */
document.addEventListener("DOMContentLoaded", async function(){

    const ok = await checkCompany()
    if(!ok) return

    loadStock()

})

</script>

{% endblock %}
