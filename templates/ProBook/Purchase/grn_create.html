{% extends "ProBook/Base/base.html" %}

{% block title %}Goods Received{% endblock %}

{% block content %}

<div class="content">

<div class="d-flex justify-content-between mb-3">
<h3>Goods Received (GRN)</h3>
<button class="btn btn-success" onclick="saveGRN()">Save GRN</button>
</div>

<div class="card">
<div class="card-body">

<div class="row mb-3">

<div class="col-md-4">
<label>Purchase Order</label>
<select id="po_select" class="form-control" onchange="loadPOItems()">
<option value="">Select PO</option>
</select>
</div>

<div class="col-md-4">
<label>GRN Date</label>
<input type="date" id="grn_date" class="form-control">
</div>

</div>


<table class="table table-bordered">
<thead>
<tr>
<th>Item</th>
<th>Ordered Qty</th>
<th>Received Qty</th>
</tr>
</thead>

<tbody id="items_table">

</tbody>

</table>

</div>
</div>

</div>

<script>

async function loadPOs(){

let res = await fetch("/api/purchase-orders")
let data = await res.json()

let select = document.getElementById("po_select")

data.forEach(po=>{
    let opt = document.createElement("option")
    opt.value = po.id
    opt.text = po.po_number
    select.appendChild(opt)
})

}

async function loadPOItems(){

let po_id = document.getElementById("po_select").value

let res = await fetch(`/api/purchase-orders/${po_id}`)
let data = await res.json()

let tbody = document.getElementById("items_table")
tbody.innerHTML = ""

data.items.forEach(item=>{

let row = `
<tr>

<td>${item.item_name}</td>

<td>${item.qty}</td>

<td>
<input type="number"
class="form-control qty"
data-item="${item.item_id}"
value="0">
</td>

</tr>
`

tbody.innerHTML += row

})

}

async function saveGRN(){

let po_id = document.getElementById("po_select").value
let date = document.getElementById("grn_date").value

let rows = document.querySelectorAll(".qty")

let items = []

rows.forEach(r=>{

let qty = parseFloat(r.value)

if(qty > 0){

items.push({
item_id: r.dataset.item,
qty: qty
})

}

})

let payload = {

po_id: po_id,
receipt_date: date,
items: items

}

await fetch("/api/grn",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(payload)
})

alert("GRN Saved")

location.reload()

}

loadPOs()

</script>

{% endblock %}
