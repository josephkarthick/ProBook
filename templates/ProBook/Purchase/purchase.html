{% extends "ProBook/Base/base.html" %}

{% block content %}

<div class="container-fluid">

<div class="card">

<div class="card-header">
<h4>Create Purchase Bill</h4>
</div>

<div class="card-body">

<div class="row">

<div class="col-md-4">
<label>Vendor</label>

<select id="vendor" class="form-control">

{% for v in vendors %}
<option value="{{v.id}}">{{v.name}}</option>
{% endfor %}

</select>
</div>

<div class="col-md-4">
<label>Date</label>
<input type="date" id="bill_date" class="form-control">
</div>

</div>

<hr>

<table class="table table-bordered">

<thead>
<tr>
<th>Item</th>
<th>Qty</th>
<th>Rate</th>
<th>GST %</th>
<th>Amount</th>
<th>Total</th>
<th></th>
</tr>
</thead>

<tbody id="purchaseTable">

<tr>

<td>
<select class="form-control item">
{% for i in items %}
<option value="{{i.id}}" data-gst="{{i.gst_rate}}">
{{i.name}}
</option>
{% endfor %}
</select>
</td>

<td>
<input type="number" class="form-control qty" value="1">
</td>

<td>
<input type="number" class="form-control rate" value="0">
</td>

<td>
<input type="number" class="form-control gst" value="0">
</td>

<td class="amount">0</td>

<td class="total">0</td>

<td>
<button class="btn btn-danger removeRow">X</button>
</td>

</tr>

</tbody>

</table>

<button class="btn btn-secondary" id="addRow">Add Row</button>

<hr>

<div class="text-end">

<h5>Total Amount: <span id="grandTotal">0</span></h5>

</div>

<button class="btn btn-primary" id="savePurchase">
Save Purchase
</button>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>

function calculateRow(row){

let qty = parseFloat(row.querySelector(".qty").value || 0)
let rate = parseFloat(row.querySelector(".rate").value || 0)
let gst = parseFloat(row.querySelector(".gst").value || 0)

let amount = qty * rate
let gst_amount = amount * gst / 100
let total = amount + gst_amount

row.querySelector(".amount").innerText = amount.toFixed(2)
row.querySelector(".total").innerText = total.toFixed(2)

calculateGrandTotal()
}

function calculateGrandTotal(){

let total = 0

document.querySelectorAll(".total").forEach(t=>{
total += parseFloat(t.innerText || 0)
})

document.getElementById("grandTotal").innerText = total.toFixed(2)
}

document.addEventListener("input", function(e){

let row = e.target.closest("tr")

if(row) calculateRow(row)

})

document.getElementById("addRow").onclick = function(){

let table = document.getElementById("purchaseTable")

let newRow = table.rows[0].cloneNode(true)

newRow.querySelectorAll("input").forEach(i=>i.value=0)

table.appendChild(newRow)

}

document.addEventListener("click",function(e){

if(e.target.classList.contains("removeRow")){

e.target.closest("tr").remove()

calculateGrandTotal()

}

})

document.getElementById("savePurchase").onclick = async function(){

let rows = document.querySelectorAll("#purchaseTable tr")

let items = []

rows.forEach(r=>{

items.push({

item_id: r.querySelector(".item").value,
qty: parseFloat(r.querySelector(".qty").value),
rate: parseFloat(r.querySelector(".rate").value),
gst_rate: parseFloat(r.querySelector(".gst").value)

})

})

let payload = {

vendor_id: document.getElementById("vendor").value,
bill_date: document.getElementById("bill_date").value,
items: items

}

let res = await fetch("/purchases/",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

credentials:"same-origin",

body: JSON.stringify(payload)

})

let data = await res.json()

if(res.ok){

Swal.fire("Success","Purchase saved","success")

}else{

Swal.fire("Error",data.detail,"error")

}

}

</script>

{% endblock %}
