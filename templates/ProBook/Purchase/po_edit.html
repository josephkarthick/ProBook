{% extends "ProBook/Base/base.html" %}
{% block title %}Edit Purchase Order{% endblock %}

{% block content %}

<div class="content">

<div class="d-flex justify-content-between mb-4">

<h3>Edit Purchase Order</h3>

<button class="btn btn-success" onclick="updatePO()">
Update PO
</button>

</div>


<div class="card">
<div class="card-body">

<div class="row mb-4">

<div class="col-md-4">
<label>Vendor</label>
<select class="form-select" id="vendorSelect"></select>
</div>

<div class="col-md-3">
<label>PO Date</label>
<input type="date" id="poDate" class="form-control">
</div>

</div>


<table class="table table-bordered" id="purchaseTable">

<thead>
<tr>
<th width="250">Item</th>
<th width="100">Qty</th>
<th width="120">Price</th>
<th width="100">GST %</th>
<th width="150">Total</th>
<th width="50"></th>
</tr>
</thead>

<tbody></tbody>

</table>

<br>

<button class="btn btn-sm btn-primary" onclick="addRow()">
+ Add Item
</button>

<hr>

<div class="row justify-content-end">

<div class="col-md-4">

<table class="table">

<tr>
<th>Subtotal</th>
<td id="subtotal">0.00</td>
</tr>

<tr>
<th>GST</th>
<td id="taxTotal">0.00</td>
</tr>

<tr class="fw-bold">
<th>Grand Total</th>
<td id="grandTotal">0.00</td>
</tr>

</table>

</div>

</div>

</div>
</div>

</div>


<script>

const poId = window.location.pathname.split("/").pop()

let items = []
let vendors = []
let poData = {}


/* LOAD VENDORS */

async function loadVendors(){

const res = await fetch("/vendors/")
vendors = await res.json()

const select = document.getElementById("vendorSelect")

select.innerHTML = `<option value="">Select Vendor</option>`

vendors.forEach(v=>{
select.innerHTML += `<option value="${v.id}">${v.name}</option>`
})

}


/* LOAD ITEMS */

async function loadItems(){

const res = await fetch("/api/items")
items = await res.json()

}


/* LOAD PO */

async function loadPO(){

const res = await fetch(`/api/purchase-orders/${poId}`)
poData = await res.json()

document.getElementById("vendorSelect").value = poData.vendor_id
document.getElementById("poDate").value = poData.po_date

poData.items.forEach(i=>{
addRow(i)
})

calculateTotals()

}


/* ADD ROW */

function addRow(data=null){

const tbody = document.querySelector("#purchaseTable tbody")

const row = document.createElement("tr")

row.innerHTML = `

<td>

<select class="form-select item-select">

<option value="">Select Item</option>

${items.map(it=>`
<option value="${it.id}"
data-price="${it.purchase_price}"
data-gst="${it.gst_rate}"
${data && data.item_id==it.id ? "selected":""}>
${it.name}
</option>
`).join("")}

</select>

</td>

<td>
<input type="number"
class="form-control qty"
value="${data ? data.ordered_qty : 1}"
oninput="calculateRow(this)">
</td>

<td>
<input type="number"
class="form-control price"
value="${data ? data.price : 0}"
step="0.01"
oninput="calculateRow(this)">
</td>

<td>
<input type="number"
class="form-control gst"
value="${data ? data.gst_rate : 0}"
step="0.01"
oninput="calculateRow(this)">
</td>

<td class="rowTotal">0.00</td>

<td>
<button class="btn btn-sm btn-danger"
onclick="removeRow(this)">
✕
</button>
</td>

`

tbody.appendChild(row)

calculateRow(row.querySelector(".qty"))

}


/* AUTO ITEM PRICE + GST */

document.addEventListener("change", function(e){

if(e.target.classList.contains("item-select")){

const option = e.target.selectedOptions[0]

const price = option.dataset.price || 0
const gst = option.dataset.gst || 0

const row = e.target.closest("tr")

row.querySelector(".price").value = price
row.querySelector(".gst").value = gst

calculateRow(row.querySelector(".qty"))

}

})


/* REMOVE ROW */

function removeRow(btn){

btn.closest("tr").remove()
calculateTotals()

}


/* CALCULATE ROW */

function calculateRow(input){

const row = input.closest("tr")

const qty = Number(row.querySelector(".qty").value)
const price = Number(row.querySelector(".price").value)
const gst = Number(row.querySelector(".gst").value)

const subtotal = qty * price
const tax = subtotal * gst / 100
const total = subtotal + tax

row.querySelector(".rowTotal").innerText = total.toFixed(2)

calculateTotals()

}


/* TOTALS */

function calculateTotals(){

let subtotal = 0
let taxTotal = 0

document.querySelectorAll("#purchaseTable tbody tr")
.forEach(row=>{

const qty = Number(row.querySelector(".qty").value)
const price = Number(row.querySelector(".price").value)
const gst = Number(row.querySelector(".gst").value)

const sub = qty * price
const tax = sub * gst / 100

subtotal += sub
taxTotal += tax

})

document.getElementById("subtotal").innerText = subtotal.toFixed(2)
document.getElementById("taxTotal").innerText = taxTotal.toFixed(2)
document.getElementById("grandTotal").innerText = (subtotal + taxTotal).toFixed(2)

}


/* UPDATE PO */

async function updatePO(){

let poItems = []

document.querySelectorAll("#purchaseTable tbody tr")
.forEach(row=>{

const item = row.querySelector(".item-select").value
const qty = Number(row.querySelector(".qty").value)
const price = Number(row.querySelector(".price").value)
const gst = Number(row.querySelector(".gst").value)

if(item){

poItems.push({
item_id:Number(item),
quantity:qty,
price:price,
gst_rate:gst
})

}

})

await fetch(`/api/purchase-orders/${poId}`,{

method:"PUT",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

vendor_id:Number(document.getElementById("vendorSelect").value),
po_date:document.getElementById("poDate").value,
items:poItems

})

})

alert("Purchase Order Updated")

}


/* INIT */

document.addEventListener("DOMContentLoaded", async ()=>{

await loadVendors()
await loadItems()
await loadPO()

})

</script>

{% endblock %}
