{% extends "ProBook/Base/base.html" %}
{% block title %}Edit Purchase Order{% endblock %}

{% block content %}

<div class="content">

<h3>Edit Purchase Order</h3>

<br>

<h4>Vendor</h4>

<select id="vendorSelect" class="form-select mb-3"></select>


<table class="table table-bordered" id="poTable">

<thead>

<tr>
<th width="250">Item</th>
<th width="120">Qty</th>
<th width="120">Price</th>
<th width="120">GST</th>
<th width="80"></th>
</tr>

</thead>

<tbody></tbody>

</table>

<button class="btn btn-primary btn-sm" onclick="addRow()">
Add Row
</button>

<br><br>

<button class="btn btn-success" onclick="updatePO()">
Update Purchase Order
</button>

</div>


<script>

const poId = window.location.pathname.split("/").pop()

let vendors = []
let items = []
let poData = {}


/* LOAD VENDORS */

async function loadVendors(){

const res = await fetch("/vendors/")
vendors = await res.json()

const select = document.getElementById("vendorSelect")

vendors.forEach(v=>{

select.innerHTML += `
<option value="${v.id}">
${v.name}
</option>
`

})

}


/* LOAD ITEMS */

async function loadItems(){

const res = await fetch("/api/items")
items = await res.json()

}


/* LOAD PO */

async function loadPO(){

const res = await fetch(`/api/purchase-orders/${poId}`)
poData = await res.json()

document.getElementById("vendorSelect").value = poData.vendor_id

poData.items.forEach(i=>{
addRow(i)
})

}


/* ADD ROW */

function addRow(data=null){

const tbody = document.querySelector("#poTable tbody")

const row = document.createElement("tr")

row.innerHTML = `

<td>

<select class="form-select item">

${items.map(it=>`

<option value="${it.id}"
${data && data.item_id==it.id ? "selected":""}>

${it.name}

</option>

`).join("")}

</select>

</td>

<td>

<input type="number"
class="form-control qty"
value="${data ? data.quantity : 1}">

</td>

<td>

<input type="number"
class="form-control price"
value="${data ? data.price : 0}">

</td>

<td>

<input type="number"
class="form-control gst"
value="${data ? data.gst_rate : 0}">

</td>

<td>

<button class="btn btn-danger btn-sm"
onclick="this.closest('tr').remove()">
✕
</button>

</td>

`

tbody.appendChild(row)

}


/* UPDATE PO */

async function updatePO(){

let itemsData = []

document.querySelectorAll("#poTable tbody tr")
.forEach(row=>{

itemsData.push({

item_id:Number(row.querySelector(".item").value),
quantity:Number(row.querySelector(".qty").value),
price:Number(row.querySelector(".price").value),
gst_rate:Number(row.querySelector(".gst").value)

})

})


await fetch(`/api/purchase-orders/${poId}`,{

method:"PUT",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

vendor_id:Number(document.getElementById("vendorSelect").value),
items:itemsData

})

})


alert("Purchase Order Updated")

}


/* INIT */

document.addEventListener("DOMContentLoaded", async ()=>{

await loadVendors()
await loadItems()
await loadPO()

})

</script>

{% endblock %}
