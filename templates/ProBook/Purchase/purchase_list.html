{% extends "ProBook/Base/base.html" %}

{% block title %}Purchase Bills{% endblock %}

{% block content %}

<div class="content">

    <!-- Page Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <h3 class="mb-0">Purchase Bills</h3>

        <a href="/purchase-create" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Create Purchase
        </a>

    </div>


    <!-- Purchase Table -->
    <div class="card shadow-sm">
        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-hover table-bordered align-middle">

                    <thead class="table-light">
                        <tr>
                            <th width="120">Bill No</th>
                            <th width="140">Date</th>
                            <th>Vendor</th>
                            <th width="150" class="text-end">Total</th>
                            <th width="120" class="text-center">Status</th>
                        </tr>
                    </thead>

                    <tbody id="purchaseBody">

                        <tr>
                            <td colspan="5" class="text-center text-muted py-4">
                                Loading purchase bills...
                            </td>
                        </tr>

                    </tbody>

                </table>

            </div>

        </div>
    </div>

</div>


<!-- SweetAlert -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>


<script>

/* =========================
LOAD PURCHASE BILLS
========================= */

async function loadPurchases(){

    try{

        const res = await fetch("/purchases/");

        if(!res.ok){
            throw new Error("Failed to load purchases");
        }

        const data = await res.json();

        const body = document.getElementById("purchaseBody");

        body.innerHTML = "";

        if(!data.length){

            body.innerHTML = `
                <tr>
                    <td colspan="5" class="text-center text-muted py-4">
                        No purchase bills found
                    </td>
                </tr>
            `;

            return;
        }

        data.forEach(p => {

            const status = p.status || "POSTED";

            const statusBadge = `
                <span class="badge bg-success">
                    ${status}
                </span>
            `;

            body.innerHTML += `

                <tr>

                    <td>
                        <a href="/purchase-view/${p.id}" class="fw-semibold text-decoration-none">
                            ${p.bill_no || ''}
                        </a>
                    </td>

                    <td>
                        ${p.bill_date || ''}
                    </td>

                    <td>
                        ${p.vendor_name || ''}
                    </td>

                    <td class="text-end">
                        ${Number(p.grand_total || 0).toFixed(2)}
                    </td>

                    <td class="text-center">
                        ${statusBadge}
                    </td>

                </tr>

            `;

        });

    }
    catch(err){

        console.error(err);

        Swal.fire({
            icon: "error",
            title: "Error",
            text: "Unable to load purchase bills"
        });

    }

}


/* =========================
PAGE INIT
========================= */

document.addEventListener("DOMContentLoaded", function(){

    loadPurchases();

});

</script>

{% endblock %}
