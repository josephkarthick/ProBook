{% extends "ProBook/Base/base.html" %}
{% block title %}Purchase Bill | ProBook{% endblock %}

{% block content %}

<div class="content">

<div class="d-flex justify-content-between mb-4">
<h3>Purchase Bill</h3>

<button class="btn btn-success" onclick="savePurchase()">
Save Bill
</button>

</div>


<div class="card">
<div class="card-body">

<div class="row mb-4">

<div class="col-md-3">
<label>Bill No</label>
<input type="text" id="billNo" class="form-control" placeholder="Auto Generated" readonly>
</div>

<div class="col-md-3">
<label>Vendor</label>
<select class="form-select" id="vendorSelect"></select>
</div>

<div class="col-md-3">
<label>Bill Date</label>
<input type="date" id="billDate" class="form-control">
</div>

</div>


<table class="table table-bordered" id="purchaseTable">

<thead>
<tr>
<th width="250">Item</th>
<th width="100">Qty</th>
<th width="120">Price</th>
<th width="100">GST %</th>
<th width="150">Total</th>
<th width="50"></th>
</tr>
</thead>

<tbody></tbody>

</table>

<br>

<button class="btn btn-sm btn-primary" onclick="addRow()">
+ Add Item
</button>

<hr>

<div class="row justify-content-end">

<div class="col-md-4">

<table class="table">

<tr>
<th>Subtotal</th>
<td id="subtotal">0.00</td>
</tr>

<tr>
<th>GST</th>
<td id="taxTotal">0.00</td>
</tr>

<tr class="fw-bold">
<th>Grand Total</th>
<td id="grandTotal">0.00</td>
</tr>

</table>

</div>

</div>

</div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>

let items = []
let vendors = []
let company_id = null


/* ------------------------
CHECK ACTIVE COMPANY
------------------------- */

async function checkCompany(){

const res = await fetch("/api/companies/active")
const data = await res.json()

if(!data.company_id){

Swal.fire({
icon:"warning",
title:"Company Required",
text:"Please select a company first"
}).then(()=>{
window.location.href="/company"
})

return false
}

company_id = data.company_id
return true

}


/* ------------------------
LOAD VENDORS
------------------------- */

async function loadVendors(){

const res = await fetch("/vendors/")
vendors = await res.json()

const select = document.getElementById("vendorSelect")

select.innerHTML = `<option value="">Select Vendor</option>`

vendors.forEach(v=>{

select.innerHTML += `
<option value="${v.id}">
${v.name}
</option>
`

})

}


/* ------------------------
LOAD ITEMS
------------------------- */

async function loadItems(){

const res = await fetch("/api/items")
items = await res.json()

}


/* ------------------------
ADD ROW
------------------------- */

function addRow(){

const tbody = document.querySelector("#purchaseTable tbody")

const row = document.createElement("tr")

row.innerHTML = `

<td>

<select class="form-select item-select">

<option value="">Select Item</option>

${items.map(i=>`
<option value="${i.id}" data-gst="${i.gst_rate}" data-price="${i.purchase_price}">
${i.name}
</option>
`).join("")}

</select>

</td>

<td>

<input type="number"
class="form-control qty"
value="1"
oninput="calculateRow(this)">

</td>

<td>

<input type="number"
class="form-control price"
value="0"
step="0.01"
oninput="calculateRow(this)">

</td>

<td>

<input type="number"
class="form-control gst"
value="0"
step="0.01"
oninput="calculateRow(this)">

</td>

<td class="rowTotal">0.00</td>

<td>

<button class="btn btn-sm btn-danger"
onclick="removeRow(this)">
✕
</button>

</td>

`

tbody.appendChild(row)

}


/* ------------------------
AUTO ITEM PRICE + GST
------------------------- */

document.addEventListener("change", function(e){

if(e.target.classList.contains("item-select")){

const option = e.target.selectedOptions[0]

const price = option.dataset.price || 0
const gst = option.dataset.gst || 0

const row = e.target.closest("tr")

row.querySelector(".price").value = price
row.querySelector(".gst").value = gst

calculateRow(row.querySelector(".qty"))

}

})


/* ------------------------
REMOVE ROW
------------------------- */

function removeRow(btn){

btn.closest("tr").remove()
calculateTotals()

}


/* ------------------------
CALCULATE ROW
------------------------- */

function calculateRow(input){

const row = input.closest("tr")

const qty = Number(row.querySelector(".qty").value)
const price = Number(row.querySelector(".price").value)
const gst = Number(row.querySelector(".gst").value)

const subtotal = qty * price
const tax = subtotal * gst / 100
const total = subtotal + tax

row.querySelector(".rowTotal").innerText = total.toFixed(2)

calculateTotals()

}


/* ------------------------
TOTAL CALCULATION
------------------------- */

function calculateTotals(){

let subtotal = 0
let taxTotal = 0

document.querySelectorAll("#purchaseTable tbody tr")
.forEach(row=>{

const qty = Number(row.querySelector(".qty").value)
const price = Number(row.querySelector(".price").value)
const gst = Number(row.querySelector(".gst").value)

const sub = qty * price
const tax = sub * gst / 100

subtotal += sub
taxTotal += tax

})

document.getElementById("subtotal").innerText = subtotal.toFixed(2)
document.getElementById("taxTotal").innerText = taxTotal.toFixed(2)
document.getElementById("grandTotal").innerText = (subtotal + taxTotal).toFixed(2)

}


/* ------------------------
SAVE PURCHASE
------------------------- */

async function savePurchase(){

const vendor = document.getElementById("vendorSelect").value
const billDate = document.getElementById("billDate").value

if(!vendor){

Swal.fire({
icon:"warning",
title:"Vendor Required",
text:"Please select a vendor"
})

return
}

if(!billDate){

Swal.fire({
icon:"warning",
title:"Bill Date Required",
text:"Please select bill date"
})

return
}

let billItems = []

document.querySelectorAll("#purchaseTable tbody tr")
.forEach(row=>{

const item = row.querySelector(".item-select").value
const qty = Number(row.querySelector(".qty").value)
const price = Number(row.querySelector(".price").value)
const gst = Number(row.querySelector(".gst").value)

if(item){

billItems.push({

item_id:Number(item),
quantity:qty,
price:price,
gst_rate:gst

})

}

})

if(billItems.length === 0){

Swal.fire({
icon:"warning",
title:"No Items",
text:"Please add items to purchase bill"
})

return
}

const subtotal = Number(document.getElementById("subtotal").innerText)
const tax = Number(document.getElementById("taxTotal").innerText)
const grand = Number(document.getElementById("grandTotal").innerText)


const res = await fetch("/purchases/",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

company_id:company_id,
vendor_id:Number(vendor),
bill_date:billDate,

total_amount:subtotal,
tax_amount:tax,
grand_total:grand,

items:billItems

})

})

const data = await res.json()

if(!res.ok){

Swal.fire({
icon:"error",
title:"Error",
text:data.detail || "Failed to save purchase"
})

return
}

document.getElementById("billNo").value = data.bill_no || ""

Swal.fire({
icon:"success",
title:"Purchase Saved",
text:"Purchase bill created successfully",
timer:1500,
showConfirmButton:false
})

document.querySelector("#purchaseTable tbody").innerHTML=""
addRow()

calculateTotals()

}


/* ------------------------
INIT
------------------------- */

document.addEventListener("DOMContentLoaded", async function(){

document.getElementById("billDate").value =
new Date().toISOString().split("T")[0]

const ok = await checkCompany()
if(!ok) return

await loadVendors()
await loadItems()

addRow()

})

</script>

{% endblock %}
