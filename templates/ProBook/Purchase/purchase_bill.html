{% extends "ProBook/Base/base.html" %}
{% block title %}Purchase Bill | ProBook{% endblock %}

{% block content %}

<div class="content">

<div class="d-flex justify-content-between mb-4">
<h3>Purchase Bill</h3>

<button class="btn btn-success" onclick="savePurchase()">
Save Bill
</button>
</div>


<div class="card">
<div class="card-body">


<!-- HEADER -->
<div class="row mb-4">

<div class="col-md-3">
<label>Vendor</label>
<select class="form-select" id="vendorSelect"></select>
</div>

<div class="col-md-3">
<label>Vendor Invoice No</label>
<input type="text" id="invoiceNo" class="form-control">
</div>

<div class="col-md-3">
<label>Bill Date</label>
<input type="date" id="billDate" class="form-control">
</div>

<div class="col-md-3">
<label>Purchase Order</label>
<select class="form-select" id="poSelect" onchange="loadPOItems()">
<option value="">Manual Bill</option>
</select>
</div>

</div>


<!-- TABLE -->

<table class="table table-bordered" id="purchaseTable">

<thead>
<tr>
<th width="250">Item</th>
<th width="100">Qty</th>
<th width="120">Price</th>
<th width="100">GST %</th>
<th width="150">Total</th>
<th width="50"></th>
</tr>
</thead>

<tbody></tbody>

</table>

<br>

<button class="btn btn-sm btn-primary" onclick="addRow()">
+ Add Item
</button>

<hr>


<!-- TOTALS -->

<div class="row justify-content-end">

<div class="col-md-4">

<table class="table">

<tr>
<th>Subtotal</th>
<td id="subtotal">0.00</td>
</tr>

<tr>
<th>GST</th>
<td id="taxTotal">0.00</td>
</tr>

<tr class="fw-bold">
<th>Grand Total</th>
<td id="grandTotal">0.00</td>
</tr>

</table>

</div>

</div>

</div>
</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>

let items = []
let vendors = []


/* LOAD VENDORS */

async function loadVendors(){

const res = await fetch("/vendors/")
vendors = await res.json()

const select = document.getElementById("vendorSelect")

select.innerHTML = `<option value="">Select Vendor</option>`

vendors.forEach(v=>{
select.innerHTML += `<option value="${v.id}">${v.name}</option>`
})

}



/* LOAD ITEMS */

async function loadItems(){

const res = await fetch("/api/items")
items = await res.json()

}



/* LOAD ALL PO */

async function loadPOs(){

const res = await fetch("/api/purchase-orders")
const data = await res.json()

const select=document.getElementById("poSelect")

select.innerHTML=`<option value="">Manual Bill</option>`

data.forEach(po=>{
select.innerHTML += `
<option value="${po.id}" data-vendor="${po.vendor_id}">
${po.po_number}
</option>`
})

}



/* LOAD PO ITEMS */

async function loadPOItems(){

const po=document.getElementById("poSelect").value

if(!po) return

const option=document.querySelector(`#poSelect option[value="${po}"]`)
const vendor=option.dataset.vendor

document.getElementById("vendorSelect").value=vendor


const res=await fetch(`/api/purchase-orders/${po}`)
const data=await res.json()

const tbody=document.querySelector("#purchaseTable tbody")

tbody.innerHTML=""


data.items.forEach(i=>{

const qty = i.ordered_qty ? i.ordered_qty : 1

const row = document.createElement("tr")

row.setAttribute("data-item", i.item_id)

row.innerHTML=`

<td>${i.item_name}</td>

<td>
<input type="number"
class="form-control qty"
value="${qty}"
min="0"
oninput="calculateRow(this)">
</td>

<td>
<input type="number"
class="form-control price"
value="${i.price}"
oninput="calculateRow(this)">
</td>

<td>
<input type="number"
class="form-control gst"
value="${i.gst_rate}"
oninput="calculateRow(this)">
</td>

<td class="rowTotal">0.00</td>

<td></td>

`

tbody.appendChild(row)

})


/* Calculate rows */

document.querySelectorAll("#purchaseTable tbody tr").forEach(row=>{
calculateRow(row.querySelector(".qty"))
})

}



/* ADD ROW */

function addRow(){

const tbody=document.querySelector("#purchaseTable tbody")

const row=document.createElement("tr")

row.innerHTML=`

<td>
<select class="form-select item-select">

<option value="">Select Item</option>

${items.map(i=>`
<option value="${i.id}"
data-price="${i.purchase_price}"
data-gst="${i.gst_rate}">
${i.name}
</option>
`).join("")}

</select>
</td>

<td>
<input type="number" class="form-control qty" value="1" oninput="calculateRow(this)">
</td>

<td>
<input type="number" class="form-control price" value="0" oninput="calculateRow(this)">
</td>

<td>
<input type="number" class="form-control gst" value="0" oninput="calculateRow(this)">
</td>

<td class="rowTotal">0.00</td>

<td>
<button class="btn btn-sm btn-danger" onclick="removeRow(this)">✕</button>
</td>
`

tbody.appendChild(row)

}



/* AUTO PRICE */

document.addEventListener("change",function(e){

if(e.target.classList.contains("item-select")){

const option=e.target.selectedOptions[0]

const price=option.dataset.price || 0
const gst=option.dataset.gst || 0

const row=e.target.closest("tr")

row.querySelector(".price").value=price
row.querySelector(".gst").value=gst

calculateRow(row.querySelector(".qty"))

}

})



/* REMOVE ROW */

function removeRow(btn){

btn.closest("tr").remove()

calculateTotals()

}



/* CALCULATE ROW */

function calculateRow(input){

const row=input.closest("tr")

const qty=Number(row.querySelector(".qty").value) || 0
const price=Number(row.querySelector(".price").value) || 0
const gst=Number(row.querySelector(".gst").value) || 0

const subtotal=qty*price
const tax=subtotal*gst/100
const total=subtotal+tax

row.querySelector(".rowTotal").innerText=total.toFixed(2)

calculateTotals()

}



/* TOTALS */

function calculateTotals(){

let subtotal=0
let taxTotal=0

document.querySelectorAll("#purchaseTable tbody tr").forEach(row=>{

const qty=Number(row.querySelector(".qty").value) || 0
const price=Number(row.querySelector(".price").value) || 0
const gst=Number(row.querySelector(".gst").value) || 0

const sub=qty*price
const tax=sub*gst/100

subtotal+=sub
taxTotal+=tax

})

document.getElementById("subtotal").innerText=subtotal.toFixed(2)
document.getElementById("taxTotal").innerText=taxTotal.toFixed(2)
document.getElementById("grandTotal").innerText=(subtotal+taxTotal).toFixed(2)

}



/* SAVE PURCHASE */

async function savePurchase(){

const vendor=document.getElementById("vendorSelect").value
const billDate=document.getElementById("billDate").value
const invoiceNo=document.getElementById("invoiceNo").value

let billItems=[]

document.querySelectorAll("#purchaseTable tbody tr").forEach(row=>{

const item=row.querySelector(".item-select")?.value || row.dataset.item

const qty=Number(row.querySelector(".qty").value) || 0
const price=Number(row.querySelector(".price").value) || 0
const gst=Number(row.querySelector(".gst").value) || 0

if(item && qty>0){

billItems.push({
item_id:Number(item),
quantity:qty,
price:price,
gst_rate:gst
})

}

})


if(billItems.length===0){
Swal.fire("Add Items","","warning")
return
}


const res=await fetch("/purchases/",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

vendor_id:Number(vendor),
invoice_no:invoiceNo,
bill_date:billDate,
items:billItems

})

})


const data=await res.json()

if(!res.ok){

Swal.fire({
icon:"error",
title:"Error",
text:data.detail || "Failed to save purchase"
})

return
}


Swal.fire({
icon:"success",
title:"Purchase Saved",
timer:1500,
showConfirmButton:false
})

document.querySelector("#purchaseTable tbody").innerHTML=""

addRow()

calculateTotals()

}



/* INIT */

document.addEventListener("DOMContentLoaded",async function(){

await loadVendors()
await loadItems()
await loadPOs()

/* auto bill date */
document.getElementById("billDate").value =
new Date().toISOString().split("T")[0]

addRow()

})

</script>

{% endblock %}
