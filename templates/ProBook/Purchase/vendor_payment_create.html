{% extends "ProBook/Base/base.html" %}

{% block title %}Vendor Payment | ProBook{% endblock %}

{% block content %}

<div class="content">

<div class="d-flex justify-content-between mb-4">
<h3>Vendor Payment</h3>
<a href="/vendor-payments" class="btn btn-light">Back</a>
</div>

<div class="card">
<div class="card-body">

<div class="row mb-4">

<div class="col-md-4">
<label>Vendor</label>
<select id="vendorSelect" class="form-select" onchange="loadBills()">
<option value="">Select Vendor</option>
</select>
</div>

<div class="col-md-3">
<label>Payment Date</label>
<input type="date" id="paymentDate" class="form-control">
</div>

<div class="col-md-3">
<label>Payment Method</label>
<select id="paymentMethod" class="form-select">
<option value="CASH">Cash</option>
<option value="BANK">Bank</option>
<option value="UPI">UPI</option>
<option value="CHEQUE">Cheque</option>
</select>
</div>

</div>


<div class="table-responsive">

<table class="table table-bordered">

<thead>
<tr>
<th>Bill No</th>
<th>Date</th>
<th>Total</th>
<th>Paid</th>
<th>Balance</th>
<th width="150">Pay Amount</th>
</tr>
</thead>

<tbody id="billTable">

<tr>
<td colspan="6" class="text-center text-muted">
Select vendor to load purchase bills
</td>
</tr>

</tbody>

</table>

</div>


<div class="row mt-3">

<div class="col-md-6">
<label>Reference</label>
<input id="reference" class="form-control">
</div>

<div class="col-md-6">
<label>Description</label>
<input id="description" class="form-control">
</div>

</div>


<div class="d-flex justify-content-end mt-4">
<h4>Total Payment: ₹ <span id="totalPayment">0.00</span></h4>
</div>


<div class="text-end mt-3">
<button class="btn btn-primary" onclick="savePayment()">
Save Payment
</button>
</div>

</div>
</div>

</div>


<script>

/* Load Vendors */

async function loadVendors(){

const res = await fetch("/vendors/")
const vendors = await res.json()

const select = document.getElementById("vendorSelect")

select.innerHTML = `<option value="">Select Vendor</option>`

vendors.forEach(v=>{

select.innerHTML += `
<option value="${v.id}">
${v.name}
</option>
`

})

}


/* Load Purchase Bills */

async function loadBills(){

const vendorId = document.getElementById("vendorSelect").value

if(!vendorId) return

const res = await fetch(`/api/vendor/${vendorId}/bills`)
const bills = await res.json()

const body = document.getElementById("billTable")

body.innerHTML = ""

if(!bills.length){

body.innerHTML = `
<tr>
<td colspan="6" class="text-center text-muted">
No pending bills
</td>
</tr>
`
return

}

bills.forEach(b=>{

body.innerHTML += `

<tr>

<td>${b.bill_no}</td>
<td>${b.bill_date}</td>
<td>${b.grand_total}</td>
<td>${b.paid_amount}</td>
<td>${b.balance_amount}</td>

<td>
<input 
type="number"
class="form-control payInput"
data-id="${b.id}"
data-balance="${b.balance_amount}"
oninput="calculateTotal()"
step="0.01"
/>
</td>

</tr>

`

})

}


/* Calculate Payment Total */

function calculateTotal(){

let total = 0

document.querySelectorAll(".payInput").forEach(i=>{

const amount = parseFloat(i.value || 0)
const balance = parseFloat(i.dataset.balance)

if(amount > balance){

alert("Cannot pay more than balance")

i.value = ""
return

}

total += amount

})

document.getElementById("totalPayment").innerText = total.toFixed(2)

}


/* Save Vendor Payment */

async function savePayment(){

const vendor = document.getElementById("vendorSelect").value

if(!vendor){

alert("Please select vendor")
return

}

let allocations = []

document.querySelectorAll(".payInput").forEach(i=>{

const amount = parseFloat(i.value || 0)

if(amount > 0){

allocations.push({

purchase_invoice_id: Number(i.dataset.id),
amount: amount

})

}

})

if(allocations.length === 0){

alert("Enter payment amount")
return

}

const payload = {

vendor_id: Number(vendor),
payment_date: document.getElementById("paymentDate").value,
payment_method: document.getElementById("paymentMethod").value,
reference: document.getElementById("reference").value,
description: document.getElementById("description").value,
allocations: allocations

}

await fetch("/api/vendor-payments",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(payload)

})

alert("Vendor payment saved")

window.location.href="/vendor-payments"

}


/* Init */

document.addEventListener("DOMContentLoaded", function(){

loadVendors()

})

</script>

{% endblock %}
