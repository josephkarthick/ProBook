{% extends "ProBook/Base/base.html" %}

{% block title %}Vendor Payments{% endblock %}

{% block content %}

<div class="content">

<div class="d-flex align-items-center justify-content-between mb-4">

<h3 class="mb-0">Vendor Payments</h3>

<a href="/vendor-payment-create" class="btn btn-primary">
Create Payment
</a>

</div>


<div class="card">

<div class="card-body">

<div class="table-responsive">

<table class="table table-bordered table-hover">

<thead>

<tr>

<th>Payment No</th>
<th>Date</th>
<th>Vendor</th>
<th>Method</th>
<th>Amount</th>
<th width="180">Action</th>

</tr>

</thead>

<tbody id="paymentTable">

<tr>
<td colspan="6" class="text-center text-muted">
Loading payments...
</td>
</tr>

</tbody>

</table>

</div>

</div>

</div>

</div>


<script>

async function loadPayments(){

const res = await fetch("/api/vendor-payments")
const data = await res.json()

const body = document.getElementById("paymentTable")

body.innerHTML = ""

if(!data.length){

body.innerHTML = `
<tr>
<td colspan="6" class="text-center text-muted">
No payments found
</td>
</tr>
`
return
}

data.forEach(p=>{

body.innerHTML += `

<tr>

<td>${p.payment_no}</td>
<td>${p.payment_date}</td>
<td>${p.vendor_name}</td>
<td>${p.payment_method}</td>
<td>${Number(p.total_amount).toFixed(2)}</td>

<td>

<a href="/vendor-payment-view/${p.id}" 
class="btn btn-sm btn-info">
View
</a>

<a href="/vendor-payment-print/${p.id}" 
class="btn btn-sm btn-secondary">
Print
</a>

</td>

</tr>

`

})

}

document.addEventListener("DOMContentLoaded", function(){

loadPayments()

})

</script>

{% endblock %}
